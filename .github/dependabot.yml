version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      aws-sdk:
        patterns:
          - "@aws-sdk/*"
      testing:
        patterns:
          - "jest"
          - "@types/jest"
          - "@testing-library/*"
      build:
        patterns:
          - "typescript"
          - "vite"
          - "esbuild"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
