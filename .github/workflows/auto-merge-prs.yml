name: Auto-Enable Merge for PRs

on:
  pull_request:
    types: [opened, reopened]
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  enable-auto-merge:
    name: Enable auto-merge
    runs-on: ubuntu-latest

    steps:
      - name: Check if PR contains infra changes
        id: check-infra
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const { owner, repo } = context.repo;
            const prNumber = context.payload.pull_request.number;
            const { data: files } = await github.rest.pulls.listFiles({ owner, repo, pull_number: prNumber, per_page: 100 });
            const hasInfra = files.some(f => f.filename.startsWith('infra/'));
            const onlyInfra = files.every(f => f.filename.startsWith('infra/'));
            core.setOutput('has_infra', hasInfra);
            core.setOutput('only_infra', onlyInfra);
            if (onlyInfra) {
              console.log(`⚠️ PR #${prNumber} contains only infra/ changes — skipping auto-merge (SEC-05)`);
            }

      - name: Enable auto-merge for PR
        if: steps.check-infra.outputs.only_infra != 'true'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const { owner, repo } = context.repo;
            const prNumber = context.payload.pull_request.number;

            try {
              await github.graphql(`
                mutation($prId: ID!) {
                  enablePullRequestAutoMerge(input: {
                    pullRequestId: $prId,
                    mergeMethod: SQUASH
                  }) {
                    pullRequest {
                      id
                      number
                      autoMergeRequest {
                        enabledAt
                      }
                    }
                  }
                }
              `, {
                prId: context.payload.pull_request.node_id
              });
              
              console.log(`✅ Auto-merge enabled for PR #${prNumber}`);
            } catch (error) {
              console.log(`⚠️ Auto-merge skipped for PR #${prNumber}: ${error.message}`);
              console.log('This is expected when branch protection or permissions prevent auto-merge.');
            }
