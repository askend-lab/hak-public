name: Build Merlin Worker

on:
  push:
    branches: [main]
    paths:
      - "packages/merlin-worker/**"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@fb7eb401298e393da51cdcb2feb1ed0183619014 # v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-west-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@062b18b96a7aff071d4dc91bc00c4c1a7945b076 # v2

      - name: Get AWS credentials for Docker build
        id: aws-creds
        run: |
          echo "aws_access_key_id=$AWS_ACCESS_KEY_ID" >> $GITHUB_OUTPUT
          echo "aws_secret_access_key=$AWS_SECRET_ACCESS_KEY" >> $GITHUB_OUTPUT
          echo "aws_session_token=$AWS_SESSION_TOKEN" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        working-directory: packages/merlin-worker
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: merlin-worker
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            --build-arg AWS_ACCESS_KEY_ID=${{ steps.aws-creds.outputs.aws_access_key_id }} \
            --build-arg AWS_SECRET_ACCESS_KEY=${{ steps.aws-creds.outputs.aws_secret_access_key }} \
            --build-arg AWS_SESSION_TOKEN=${{ steps.aws-creds.outputs.aws_session_token }} \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Update ECS service (dev)
        run: |
          aws ecs update-service \
            --cluster hak-merlin-dev \
            --service merlin-worker \
            --force-new-deployment \
            --region eu-west-1

      - name: Update ECS service (prod)
        run: |
          aws ecs update-service \
            --cluster hak-merlin-prod \
            --service merlin-worker \
            --force-new-deployment \
            --region eu-west-1
