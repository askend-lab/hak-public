name: Build Merlin Worker

on:
  push:
    branches: [main]
    paths:
      - "packages/merlin-worker/**"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-west-1

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.7'

      - name: Run Python tests
        working-directory: packages/merlin-worker
        run: |
          pip install -r requirements-test.txt
          pytest tests/ -v --json-report --json-report-file=test-results.json

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@062b18b96a7aff071d4dc91bc00c4c1a7945b076 # v2

      - name: Build and push Docker image
        working-directory: packages/merlin-worker
        env:
          DOCKER_BUILDKIT: "1"
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: merlin-worker
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Write credentials to temp files for BuildKit secrets (not baked into image layers)
          echo -n "$AWS_ACCESS_KEY_ID" > /tmp/aws_access_key_id
          echo -n "$AWS_SECRET_ACCESS_KEY" > /tmp/aws_secret_access_key
          echo -n "$AWS_SESSION_TOKEN" > /tmp/aws_session_token

          docker build \
            --secret id=aws_access_key_id,src=/tmp/aws_access_key_id \
            --secret id=aws_secret_access_key,src=/tmp/aws_secret_access_key \
            --secret id=aws_session_token,src=/tmp/aws_session_token \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .

          # Clean up credential files
          rm -f /tmp/aws_access_key_id /tmp/aws_secret_access_key /tmp/aws_session_token

          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Deploy to dev
        if: github.event_name == 'push'
        run: |
          aws ecs update-service \
            --cluster hak-merlin-dev \
            --service merlin-worker \
            --force-new-deployment \
            --region eu-west-1

      - name: Deploy to prod
        if: github.event_name == 'workflow_dispatch'
        run: |
          aws ecs update-service \
            --cluster hak-merlin-prod \
            --service merlin-worker \
            --force-new-deployment \
            --region eu-west-1
