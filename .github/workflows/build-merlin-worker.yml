name: Build TTS Worker

on:
  push:
    branches: [main]
    paths:
      - "packages/tts-worker/**"
      - ".github/workflows/build-merlin-worker.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-west-1

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'

      - name: Run Python tests
        working-directory: packages/tts-worker
        run: |
          pip install -r requirements-test.txt
          pytest tests/ -v --json-report --json-report-file=test-results.json

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@062b18b96a7aff071d4dc91bc00c4c1a7945b076 # v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3

      - name: Prepare BuildKit secrets
        run: |
          echo -n "$AWS_ACCESS_KEY_ID" > /tmp/aws_creds_key
          echo -n "$AWS_SECRET_ACCESS_KEY" > /tmp/aws_creds_secret
          echo -n "$AWS_SESSION_TOKEN" > /tmp/aws_creds_token

      - name: Build Docker image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6
        with:
          context: packages/tts-worker
          load: true
          tags: ${{ steps.login-ecr.outputs.registry }}/merlin-worker:${{ github.sha }}
          cache-from: type=gha,scope=merlin-worker
          cache-to: type=gha,mode=max,scope=merlin-worker
          provenance: false
          secret-files: |
            aws_access_key_id=/tmp/aws_creds_key
            aws_secret_access_key=/tmp/aws_creds_secret
            aws_session_token=/tmp/aws_creds_token

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@c1824fd6edce30d7ab345a9989de00bbd46ef284 # master
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/merlin-worker:${{ github.sha }}
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
          trivyIgnores: packages/tts-worker/.trivyignore

      - name: Tag and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker tag $ECR_REGISTRY/merlin-worker:${{ github.sha }} $ECR_REGISTRY/merlin-worker:latest
          docker push $ECR_REGISTRY/merlin-worker:${{ github.sha }}
          docker push $ECR_REGISTRY/merlin-worker:latest

      - name: Clean up secrets
        if: always()
        run: rm -f /tmp/aws_creds_key /tmp/aws_creds_secret /tmp/aws_creds_token

      - name: Deploy to dev
        run: |
          aws ecs update-service \
            --cluster hak-merlin-dev \
            --service merlin-worker \
            --force-new-deployment \
            --region eu-west-1

      - name: Deploy to prod
        if: github.event_name == 'workflow_dispatch'
        run: |
          aws ecs update-service \
            --cluster hak-merlin-prod \
            --service merlin-worker \
            --force-new-deployment \
            --region eu-west-1
