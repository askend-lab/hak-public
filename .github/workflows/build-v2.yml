name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read
  packages: read

# Only one build at a time, cancel previous if new push
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.changes.outputs.frontend }}
      simplestore: ${{ steps.changes.outputs.simplestore }}
      audio-api: ${{ steps.changes.outputs.audio-api }}
      merlin-api: ${{ steps.changes.outputs.merlin-api }}
      vabamorf-api: ${{ steps.changes.outputs.vabamorf-api }}
      any_changed: ${{ steps.changes.outputs.any_changed }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Detect changed modules
        id: changes
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
          fi
          
          # Handle initial commit
          if [ "$BASE_SHA" == "0000000000000000000000000000000000000000" ]; then
            echo "Initial commit - building all"
            echo "frontend=true" >> $GITHUB_OUTPUT
            echo "simplestore=true" >> $GITHUB_OUTPUT
            echo "audio-api=true" >> $GITHUB_OUTPUT
            echo "merlin-api=true" >> $GITHUB_OUTPUT
            echo "vabamorf-api=true" >> $GITHUB_OUTPUT
            echo "any_changed=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          CHANGED_FILES=$(git diff --name-only $BASE_SHA HEAD)
          echo "Changed files:"
          echo "$CHANGED_FILES"
          
          # Detect module changes
          FRONTEND=$(echo "$CHANGED_FILES" | grep -q "^packages/frontend/" && echo "true" || echo "false")
          SIMPLESTORE=$(echo "$CHANGED_FILES" | grep -q "^packages/simplestore/" && echo "true" || echo "false")
          AUDIO_API=$(echo "$CHANGED_FILES" | grep -q "^packages/audio-api/" && echo "true" || echo "false")
          MERLIN_API=$(echo "$CHANGED_FILES" | grep -q "^packages/merlin-api/" && echo "true" || echo "false")
          VABAMORF_API=$(echo "$CHANGED_FILES" | grep -q "^packages/vabamorf-api/" && echo "true" || echo "false")
          
          # Root changes trigger all builds (package.json, tsconfig, etc)
          ROOT_CHANGED=$(echo "$CHANGED_FILES" | grep -qE "^(package\.json|pnpm-lock\.yaml|tsconfig\.json)$" && echo "true" || echo "false")
          if [ "$ROOT_CHANGED" == "true" ]; then
            echo "Root config changed - building all"
            FRONTEND=true
            SIMPLESTORE=true
            AUDIO_API=true
            MERLIN_API=true
            VABAMORF_API=true
          fi
          
          echo "frontend=$FRONTEND" >> $GITHUB_OUTPUT
          echo "simplestore=$SIMPLESTORE" >> $GITHUB_OUTPUT
          echo "audio-api=$AUDIO_API" >> $GITHUB_OUTPUT
          echo "merlin-api=$MERLIN_API" >> $GITHUB_OUTPUT
          echo "vabamorf-api=$VABAMORF_API" >> $GITHUB_OUTPUT
          
          ANY_CHANGED="false"
          [ "$FRONTEND" == "true" ] || [ "$SIMPLESTORE" == "true" ] || [ "$AUDIO_API" == "true" ] || [ "$MERLIN_API" == "true" ] || [ "$VABAMORF_API" == "true" ] && ANY_CHANGED="true"
          echo "any_changed=$ANY_CHANGED" >> $GITHUB_OUTPUT
          
          echo "Summary: frontend=$FRONTEND, simplestore=$SIMPLESTORE, audio-api=$AUDIO_API, merlin-api=$MERLIN_API, vabamorf-api=$VABAMORF_API"

  build:
    name: Build Changed Modules
    needs: detect-changes
    if: needs.detect-changes.outputs.any_changed == 'true'
    runs-on: ubuntu-latest
    
    outputs:
      build_id: ${{ steps.build-id.outputs.id }}
      modules: ${{ steps.build-id.outputs.modules }}
    
    steps:
      - name: Generate build ID
        id: build-id
        run: |
          BUILD_ID="${{ github.sha }}-$(date +%Y%m%d-%H%M%S)"
          echo "id=$BUILD_ID" >> $GITHUB_OUTPUT
          
          # Build modules list
          MODULES=""
          [ "${{ needs.detect-changes.outputs.frontend }}" == "true" ] && MODULES="${MODULES}frontend,"
          [ "${{ needs.detect-changes.outputs.simplestore }}" == "true" ] && MODULES="${MODULES}simplestore,"
          [ "${{ needs.detect-changes.outputs.audio-api }}" == "true" ] && MODULES="${MODULES}audio-api,"
          [ "${{ needs.detect-changes.outputs.merlin-api }}" == "true" ] && MODULES="${MODULES}merlin-api,"
          [ "${{ needs.detect-changes.outputs.vabamorf-api }}" == "true" ] && MODULES="${MODULES}vabamorf-api,"
          MODULES=${MODULES%,}  # Remove trailing comma
          echo "modules=$MODULES" >> $GITHUB_OUTPUT
          echo "Building modules: $MODULES"
      
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      
      - name: Configure npm registry auth
        run: |
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc
          echo "@askend-lab:registry=https://npm.pkg.github.com" >> ~/.npmrc
      
      - name: Install dependencies
        run: pnpm install
      
      - name: Run tests
        run: pnpm exec jest --passWithNoTests
      
      - name: Build frontend
        if: needs.detect-changes.outputs.frontend == 'true'
        run: pnpm --filter @hak/frontend build
      
      - name: Build SimpleStore
        if: needs.detect-changes.outputs.simplestore == 'true'
        run: pnpm --filter simplestore build
      
      - name: Build Audio API
        if: needs.detect-changes.outputs.audio-api == 'true'
        run: pnpm --filter audio-api build
      
      - name: Build Merlin API
        if: needs.detect-changes.outputs.merlin-api == 'true'
        run: pnpm --filter merlin-api build
      
      - name: Build Vabamorf API
        if: needs.detect-changes.outputs.vabamorf-api == 'true'
        working-directory: packages/vabamorf-api
        run: |
          npm ci
          npx tsc
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::465168436856:role/GitHubActionsRole
          aws-region: eu-west-1
      
      - name: Upload artifacts to S3
        run: |
          BUILD_ID="${{ steps.build-id.outputs.id }}"
          S3_PATH="s3://askend-lab-artifacts/hak/builds/${BUILD_ID}"
          
          echo "Uploading build ${BUILD_ID} to S3..."
          
          # Upload only changed modules
          [ "${{ needs.detect-changes.outputs.frontend }}" == "true" ] && aws s3 sync packages/frontend/dist/ ${S3_PATH}/frontend/ --sse AES256
          [ "${{ needs.detect-changes.outputs.simplestore }}" == "true" ] && aws s3 sync packages/simplestore/dist/ ${S3_PATH}/simplestore/ --sse AES256
          [ "${{ needs.detect-changes.outputs.audio-api }}" == "true" ] && aws s3 sync packages/audio-api/dist/ ${S3_PATH}/audio-api/ --sse AES256
          [ "${{ needs.detect-changes.outputs.merlin-api }}" == "true" ] && aws s3 sync packages/merlin-api/dist/ ${S3_PATH}/merlin-api/ --sse AES256
          [ "${{ needs.detect-changes.outputs.vabamorf-api }}" == "true" ] && aws s3 sync packages/vabamorf-api/dist/ ${S3_PATH}/vabamorf-api/ --sse AES256
          
          # Save build metadata with modules list
          cat > /tmp/build-meta.json << EOF
          {
            "sha": "${{ github.sha }}",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "ref": "${{ github.ref }}",
            "modules": "${{ steps.build-id.outputs.modules }}"
          }
          EOF
          aws s3 cp /tmp/build-meta.json ${S3_PATH}/build-meta.json --sse AES256
          
          echo "âś… Build ${BUILD_ID} uploaded to S3"
      
      - name: Build summary
        run: |
          echo "## Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "- **Build ID**: ${{ steps.build-id.outputs.id }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Modules**: ${{ steps.build-id.outputs.modules }}" >> $GITHUB_STEP_SUMMARY
          echo "- **SHA**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

  deploy-dev:
    name: Deploy to Dev
    needs: [detect-changes, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/deploy-v2.yml
    with:
      environment: dev
      build_id: ${{ needs.build.outputs.build_id }}
      modules: ${{ needs.build.outputs.modules }}
    secrets: inherit
