name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read
  packages: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  ARTIFACTS_BUCKET: askend-lab-artifacts
  ARTIFACTS_PREFIX: hak/builds

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    
    outputs:
      build_id: ${{ steps.build.outputs.build_id }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      
      - name: Configure npm registry auth
        run: |
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc
          echo "@askend-lab:registry=https://npm.pkg.github.com" >> ~/.npmrc
      
      - name: Install dependencies
        run: pnpm install
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::465168436856:role/GitHubActionsRole
          aws-region: eu-west-1
      
      - name: Detect changes and prepare build
        id: detect
        run: |
          LAST_BUILD=$(aws s3 ls s3://$ARTIFACTS_BUCKET/$ARTIFACTS_PREFIX/ --recursive | grep manifest.json | sort | tail -1 | awk '{print $4}' | cut -d'/' -f3)
          
          if [ -n "$LAST_BUILD" ]; then
            echo "Last build: $LAST_BUILD"
            aws s3 cp s3://$ARTIFACTS_BUCKET/$ARTIFACTS_PREFIX/$LAST_BUILD/manifest.json /tmp/last-manifest.json || echo "{}" > /tmp/last-manifest.json
          else
            echo "No previous build found"
            echo "{}" > /tmp/last-manifest.json
          fi
          echo "last_build=$LAST_BUILD" >> $GITHUB_OUTPUT
          
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
          fi
          
          if [ "$BASE_SHA" == "0000000000000000000000000000000000000000" ]; then
            echo "Initial commit - building all"
            echo "frontend=true" >> $GITHUB_OUTPUT
            echo "simplestore=true" >> $GITHUB_OUTPUT
            echo "audio-api=true" >> $GITHUB_OUTPUT
            echo "merlin-api=true" >> $GITHUB_OUTPUT
            echo "vabamorf-api=true" >> $GITHUB_OUTPUT
          else
            CHANGED=$(git diff --name-only $BASE_SHA HEAD)
            echo "Changed files: $CHANGED"
            
            echo "frontend=$(echo "$CHANGED" | grep -q "^packages/frontend/" && echo true || echo false)" >> $GITHUB_OUTPUT
            echo "simplestore=$(echo "$CHANGED" | grep -q "^packages/simplestore/" && echo true || echo false)" >> $GITHUB_OUTPUT
            echo "audio-api=$(echo "$CHANGED" | grep -q "^packages/audio-api/" && echo true || echo false)" >> $GITHUB_OUTPUT
            echo "merlin-api=$(echo "$CHANGED" | grep -q "^packages/merlin-api/" && echo true || echo false)" >> $GITHUB_OUTPUT
            echo "vabamorf-api=$(echo "$CHANGED" | grep -q "^packages/vabamorf-api/" && echo true || echo false)" >> $GITHUB_OUTPUT
            
            if echo "$CHANGED" | grep -qE "^(package\.json|pnpm-lock\.yaml|tsconfig\.json)$"; then
              echo "Root config changed - building all"
              echo "frontend=true" >> $GITHUB_OUTPUT
              echo "simplestore=true" >> $GITHUB_OUTPUT
              echo "audio-api=true" >> $GITHUB_OUTPUT
              echo "merlin-api=true" >> $GITHUB_OUTPUT
              echo "vabamorf-api=true" >> $GITHUB_OUTPUT
            fi
          fi
      
      - name: Run tests
        run: pnpm exec jest --passWithNoTests
      
      - name: Build frontend
        if: steps.detect.outputs.frontend == 'true'
        run: pnpm --filter @hak/frontend build
      
      - name: Build SimpleStore
        if: steps.detect.outputs.simplestore == 'true'
        run: pnpm --filter simplestore build
      
      - name: Build Audio API
        if: steps.detect.outputs.audio-api == 'true'
        run: pnpm --filter audio-api build
      
      - name: Build Merlin API
        if: steps.detect.outputs.merlin-api == 'true'
        run: pnpm --filter merlin-api build
      
      - name: Build Vabamorf API
        if: steps.detect.outputs.vabamorf-api == 'true'
        working-directory: packages/vabamorf-api
        run: |
          npm ci
          npx tsc
      
      - name: Login to ECR
        if: steps.detect.outputs.vabamorf-api == 'true'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      
      - name: Build Vabamorf Docker image
        if: steps.detect.outputs.vabamorf-api == 'true'
        working-directory: packages/vabamorf-api
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/vabamorf-api:${{ github.sha }} .
          docker push $ECR_REGISTRY/vabamorf-api:${{ github.sha }}
      
      - name: Create full build artifact
        id: build
        env:
          FRONTEND_CHANGED: ${{ steps.detect.outputs.frontend }}
          SIMPLESTORE_CHANGED: ${{ steps.detect.outputs.simplestore }}
          AUDIO_API_CHANGED: ${{ steps.detect.outputs.audio-api }}
          MERLIN_API_CHANGED: ${{ steps.detect.outputs.merlin-api }}
          VABAMORF_API_CHANGED: ${{ steps.detect.outputs.vabamorf-api }}
        run: |
          BUILD_ID="BUILD-$(date +%Y%m%d%H%M%S)"
          echo "build_id=$BUILD_ID" >> $GITHUB_OUTPUT
          
          S3_PATH="s3://$ARTIFACTS_BUCKET/$ARTIFACTS_PREFIX/$BUILD_ID"
          LAST_BUILD="${{ steps.detect.outputs.last_build }}"
          LAST_S3="s3://$ARTIFACTS_BUCKET/$ARTIFACTS_PREFIX/$LAST_BUILD"
          
          # Helper to get module SHA from last manifest
          get_last_sha() { jq -r ".modules.\"$1\" // \"unknown\"" /tmp/last-manifest.json; }
          
          # Module config: name|local_path|changed_var
          MODULES="frontend|packages/frontend/dist|FRONTEND_CHANGED
          simplestore|packages/simplestore/dist|SIMPLESTORE_CHANGED
          audio-api|packages/audio-api/dist|AUDIO_API_CHANGED
          merlin-api|packages/merlin-api/dist|MERLIN_API_CHANGED
          vabamorf-api|packages/vabamorf-api/dist|VABAMORF_API_CHANGED"
          
          # Initialize manifest modules
          declare -A MODULE_SHAS
          
          echo "$MODULES" | while IFS='|' read -r name path changed_var; do
            CHANGED=$(eval echo \$$changed_var)
            if [ "$CHANGED" == "true" ]; then
              aws s3 sync "$path/" "${S3_PATH}/$name/" --sse AES256
              MODULE_SHAS[$name]="${{ github.sha }}"
              echo "$name: built (SHA: ${{ github.sha }})"
            elif [ -n "$LAST_BUILD" ]; then
              aws s3 sync "${LAST_S3}/$name/" "${S3_PATH}/$name/" --sse AES256
              MODULE_SHAS[$name]=$(get_last_sha "$name")
              echo "$name: copied from $LAST_BUILD (SHA: ${MODULE_SHAS[$name]})"
            else
              MODULE_SHAS[$name]="unknown"
              echo "$name: no previous build, marking unknown"
            fi
          done
          
          # Build manifest using jq for proper JSON
          jq -n \
            --arg id "$BUILD_ID" \
            --arg sha "${{ github.sha }}" \
            --arg time "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg frontend "$( [ "$FRONTEND_CHANGED" == "true" ] && echo '${{ github.sha }}' || get_last_sha frontend )" \
            --arg simplestore "$( [ "$SIMPLESTORE_CHANGED" == "true" ] && echo '${{ github.sha }}' || get_last_sha simplestore )" \
            --arg audio "$( [ "$AUDIO_API_CHANGED" == "true" ] && echo '${{ github.sha }}' || get_last_sha audio-api )" \
            --arg merlin "$( [ "$MERLIN_API_CHANGED" == "true" ] && echo '${{ github.sha }}' || get_last_sha merlin-api )" \
            --arg vabamorf "$( [ "$VABAMORF_API_CHANGED" == "true" ] && echo '${{ github.sha }}' || get_last_sha vabamorf-api )" \
            '{
              build_id: $id,
              git_sha: $sha,
              timestamp: $time,
              modules: {
                frontend: $frontend,
                simplestore: $simplestore,
                "audio-api": $audio,
                "merlin-api": $merlin,
                "vabamorf-api": $vabamorf
              }
            }' > /tmp/manifest.json
          
          aws s3 cp /tmp/manifest.json ${S3_PATH}/manifest.json --sse AES256
          echo "✅ Build $BUILD_ID created"
          cat /tmp/manifest.json
      
      - name: Build summary
        run: |
          echo "## Build Complete ✅" >> $GITHUB_STEP_SUMMARY
          echo "- **Build ID**: ${{ steps.build.outputs.build_id }}" >> $GITHUB_STEP_SUMMARY
          echo "- **SHA**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Deploy command:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "gh workflow run deploy-v3.yml -f build_id=${{ steps.build.outputs.build_id }} -f environment=dev" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  deploy-dev:
    name: Deploy to Dev
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/deploy-v3.yml
    with:
      build_id: ${{ needs.build.outputs.build_id }}
      environment: dev
    secrets: inherit
