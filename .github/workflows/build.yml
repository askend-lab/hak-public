name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  packages: read
  pull-requests: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  ARTIFACTS_PREFIX: hak/builds

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    outputs:
      build_id: ${{ steps.build.outputs.build_id }}
      has_deploy_changes: ${{ steps.build.outputs.has_deploy_changes }}

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Check for code changes
        id: filter
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3
        with:
          filters: |
            code:
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'tsconfig.json'
              - '.github/workflows/build.yml'

      - name: Determine if build needed
        id: should_build
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] || [ "${{ steps.filter.outputs.code }}" == "true" ]; then
            echo "build=true" >> $GITHUB_OUTPUT
          else
            echo "build=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup pnpm
        if: steps.should_build.outputs.build == 'true'
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0
        with:
          version: 10

      - name: Setup Node.js
        if: steps.should_build.outputs.build == 'true'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          cache: "pnpm"

      - name: Configure npm registry auth
        if: steps.should_build.outputs.build == 'true'
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -n "$NPM_TOKEN" ]; then
            echo "//npm.pkg.github.com/:_authToken=$NPM_TOKEN" > ~/.npmrc
            echo "@${{ github.repository_owner }}:registry=https://npm.pkg.github.com" >> ~/.npmrc
          fi

      - name: Install dependencies
        if: steps.should_build.outputs.build == 'true'
        run: pnpm install --frozen-lockfile

      - name: Security audit
        if: steps.should_build.outputs.build == 'true'
        run: |
          if ! OUTPUT=$(pnpm audit --audit-level=high --ignore-unfixable 2>&1); then
            if echo "$OUTPUT" | grep -q "ERR_PNPM_AUDIT_BAD_RESPONSE"; then
              echo "::warning::npm audit endpoint is unreachable — skipping security audit"
            else
              echo "$OUTPUT"
              exit 1
            fi
          fi

      - name: Configure AWS credentials
        if: steps.should_build.outputs.build == 'true'
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-west-1

      - name: Load config from SSM
        if: steps.should_build.outputs.build == 'true'
        run: |
          echo "COGNITO_USER_POOL_ID=$(aws ssm get-parameter --name /hak/shared/cognito-user-pool-id --query Parameter.Value --output text 2>/dev/null || aws ssm get-parameter --name /hak/dev/cognito-user-pool-id --query Parameter.Value --output text)" >> $GITHUB_ENV
          echo "COGNITO_CLIENT_ID=$(aws ssm get-parameter --name /hak/shared/cognito-client-id --query Parameter.Value --output text 2>/dev/null || aws ssm get-parameter --name /hak/dev/cognito-client-id --query Parameter.Value --output text)" >> $GITHUB_ENV
          echo "COGNITO_DOMAIN=$(aws ssm get-parameter --name /hak/shared/cognito-domain --query Parameter.Value --output text)" >> $GITHUB_ENV
          echo "ARTIFACTS_BUCKET=$(aws ssm get-parameter --name /hak/shared/artifacts-bucket --query Parameter.Value --output text)" >> $GITHUB_ENV

      - name: Detect changes and prepare build
        if: steps.should_build.outputs.build == 'true'
        id: detect
        run: |
          LAST_BUILD=$(aws s3 ls s3://$ARTIFACTS_BUCKET/$ARTIFACTS_PREFIX/ --recursive | grep manifest.json | sort | tail -1 | awk '{print $4}' | cut -d'/' -f3)

          if [ -n "$LAST_BUILD" ]; then
            echo "Last build: $LAST_BUILD"
            aws s3 cp s3://$ARTIFACTS_BUCKET/$ARTIFACTS_PREFIX/$LAST_BUILD/manifest.json /tmp/last-manifest.json || echo "{}" > /tmp/last-manifest.json
          else
            echo "No previous build found"
            echo "{}" > /tmp/last-manifest.json
          fi
          echo "last_build=$LAST_BUILD" >> $GITHUB_OUTPUT

          if [ "${{ github.event_name }}" == "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
          fi

          # Determine changed files; fall back to building all if diff is unavailable
          CHANGED=""
          if [ -n "$BASE_SHA" ] && [ "$BASE_SHA" != "0000000000000000000000000000000000000000" ]; then
            CHANGED=$(git diff --name-only "$BASE_SHA" HEAD 2>/dev/null || true)
          fi

          if [ -z "$CHANGED" ]; then
            echo "No diff available (initial commit, workflow_dispatch, or same SHA) - building all"
            for pkg in frontend store tts-api morphology-api shared auth gherkin-parser; do
              echo "$pkg=true" >> $GITHUB_OUTPUT
            done
          else
            echo "Changed files: $CHANGED"

            # Check if @hak/shared changed — if so, rebuild and test all dependent packages
            SHARED_CHANGED=$(echo "$CHANGED" | grep -q "^packages/shared/" && echo true || echo false)

            # Root config changes trigger full build+test
            if echo "$CHANGED" | grep -qE "^(package\.json|pnpm-lock\.yaml|tsconfig\.json)$"; then
              echo "Root config changed - building all"
              SHARED_CHANGED=true
            fi

            for pkg in frontend store tts-api morphology-api auth gherkin-parser; do
              PKG_DIR=$(echo $pkg | tr '-' '-')
              echo "$pkg=$( (echo "$CHANGED" | grep -q "^packages/$PKG_DIR/" || [ "$SHARED_CHANGED" == "true" ]) && echo true || echo false)" >> $GITHUB_OUTPUT
            done
            echo "shared=$SHARED_CHANGED" >> $GITHUB_OUTPUT
          fi

      - name: Generate feature specs
        if: steps.should_build.outputs.build == 'true'
        run: pnpm --filter @hak/frontend sync-features

      - name: Lint
        if: steps.should_build.outputs.build == 'true'
        run: pnpm lint

      - name: Typecheck
        if: steps.should_build.outputs.build == 'true'
        run: pnpm typecheck

      - name: Test shared
        if: steps.detect.outputs.shared == 'true'
        run: pnpm --filter @hak/shared test:full

      - name: Test frontend
        if: steps.detect.outputs.frontend == 'true'
        run: pnpm --filter @hak/frontend test:full

      - name: Test store
        if: steps.detect.outputs.store == 'true'
        run: pnpm --filter @hak/store test:full

      - name: Test tts-api
        if: steps.detect.outputs.tts-api == 'true'
        run: pnpm --filter @hak/tts-api test:full

      - name: Test morphology-api
        if: steps.detect.outputs.morphology-api == 'true'
        run: pnpm --filter @hak/morphology-api test:full

      - name: Test auth
        if: steps.detect.outputs.auth == 'true'
        run: pnpm --filter @hak/auth test:full

      - name: Test gherkin-parser
        if: steps.detect.outputs.gherkin-parser == 'true'
        run: pnpm --filter @hak/gherkin-parser test:full

      - name: Validate frontend secrets
        if: steps.detect.outputs.frontend == 'true' && github.ref == 'refs/heads/main'
        run: |
          if [ -z "${{ secrets.VITE_SENTRY_DSN }}" ]; then
            echo "::error::VITE_SENTRY_DSN secret is not set. Frontend error tracking will be disabled in production."
            exit 1
          fi

      - name: Build frontend
        if: steps.detect.outputs.frontend == 'true'
        env:
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_COGNITO_REGION: eu-west-1
          VITE_COGNITO_USER_POOL_ID: ${{ env.COGNITO_USER_POOL_ID }}
          VITE_COGNITO_CLIENT_ID: ${{ env.COGNITO_CLIENT_ID }}
          VITE_COGNITO_DOMAIN: ${{ env.COGNITO_DOMAIN }}
        run: pnpm --filter @hak/frontend build

      - name: Build Store
        if: steps.detect.outputs.store == 'true'
        run: |
          pnpm --filter @hak/store build
          cd packages/store
          npx esbuild src/lambda/handler.ts \
            --bundle --platform=node --target=node20 --sourcemap \
            --outfile=dist-lambda/src/lambda/handler.js
          echo "✅ Store Lambda bundle created"

      - name: Build TTS API
        if: steps.detect.outputs.tts-api == 'true'
        run: pnpm --filter @hak/tts-api build

      - name: Build Morphology API
        if: steps.detect.outputs.morphology-api == 'true'
        run: pnpm --filter @hak/morphology-api build

      - name: Login to ECR
        if: steps.detect.outputs.morphology-api == 'true'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@062b18b96a7aff071d4dc91bc00c4c1a7945b076 # v2

      - name: Set up Docker Buildx
        if: steps.detect.outputs.morphology-api == 'true'
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3

      - name: Build Morphology Docker image
        if: steps.detect.outputs.morphology-api == 'true'
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6
        with:
          context: packages/morphology-api
          load: true
          tags: ${{ steps.login-ecr.outputs.registry }}/vabamorf-api:${{ github.sha }}
          cache-from: type=gha,scope=vabamorf-api
          cache-to: type=gha,mode=max,scope=vabamorf-api
          provenance: false

      - name: Scan Docker image with Trivy
        if: steps.detect.outputs.morphology-api == 'true'
        continue-on-error: true
        uses: aquasecurity/trivy-action@c1824fd6edce30d7ab345a9989de00bbd46ef284 # master
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/vabamorf-api:${{ github.sha }}
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Push Morphology Docker image
        if: steps.detect.outputs.morphology-api == 'true'
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker push $ECR_REGISTRY/vabamorf-api:${{ github.sha }}

      - name: Create full build artifact
        if: steps.should_build.outputs.build == 'true'
        id: build
        env:
          FRONTEND_CHANGED: ${{ steps.detect.outputs.frontend }}
          STORE_CHANGED: ${{ steps.detect.outputs.store }}
          TTS_API_CHANGED: ${{ steps.detect.outputs.tts-api }}
          MORPHOLOGY_API_CHANGED: ${{ steps.detect.outputs.morphology-api }}
          AUTH_CHANGED: ${{ steps.detect.outputs.auth }}
        run: |
          BUILD_ID="BUILD-$(date +%Y%m%d%H%M%S)"
          echo "build_id=$BUILD_ID" >> $GITHUB_OUTPUT

          S3_PATH="s3://$ARTIFACTS_BUCKET/$ARTIFACTS_PREFIX/$BUILD_ID"
          LAST_BUILD="${{ steps.detect.outputs.last_build }}"
          LAST_S3="s3://$ARTIFACTS_BUCKET/$ARTIFACTS_PREFIX/$LAST_BUILD"

          # Helper to get module SHA from last manifest
          get_last_sha() { jq -r ".modules.\"$1\" // \"unknown\"" /tmp/last-manifest.json 2>/dev/null || echo "unknown"; }

          # Upload each module explicitly (no subshell issues)
          upload_module() {
            local name="$1"
            local path="$2"
            local changed="$3"

            if [ "$changed" == "true" ]; then
              echo "$name: uploading from $path"
              aws s3 sync "$path/" "${S3_PATH}/$name/" --sse AES256
            elif [ -n "$LAST_BUILD" ]; then
              echo "$name: copying from $LAST_BUILD"
              aws s3 sync "${LAST_S3}/$name/" "${S3_PATH}/$name/" --sse AES256
            else
              echo "$name: skipping (no previous build)"
            fi
          }

          upload_module "frontend" "packages/frontend/dist" "$FRONTEND_CHANGED"
          upload_module "store" "packages/store/dist-lambda" "$STORE_CHANGED"
          upload_module "tts-api" "packages/tts-api/dist" "$TTS_API_CHANGED"
          upload_module "morphology-api" "packages/morphology-api/dist" "$MORPHOLOGY_API_CHANGED"

          # Build manifest using jq
          jq -n \
            --arg id "$BUILD_ID" \
            --arg sha "${{ github.sha }}" \
            --arg time "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg frontend "$( [ "$FRONTEND_CHANGED" == "true" ] && echo '${{ github.sha }}' || get_last_sha frontend )" \
            --arg store "$( [ "$STORE_CHANGED" == "true" ] && echo '${{ github.sha }}' || get_last_sha store )" \
            --arg ttsapi "$( [ "$TTS_API_CHANGED" == "true" ] && echo '${{ github.sha }}' || get_last_sha tts-api )" \
            --arg morphology "$( [ "$MORPHOLOGY_API_CHANGED" == "true" ] && echo '${{ github.sha }}' || get_last_sha morphology-api )" \
            --arg auth "$( [ "$AUTH_CHANGED" == "true" ] && echo '${{ github.sha }}' || get_last_sha auth )" \
            '{
              build_id: $id,
              git_sha: $sha,
              timestamp: $time,
              modules: {
                frontend: $frontend,
                store: $store,
                "tts-api": $ttsapi,
                "morphology-api": $morphology,
                auth: $auth
              }
            }' > /tmp/manifest.json

          aws s3 cp /tmp/manifest.json ${S3_PATH}/manifest.json --sse AES256
          # Check if any deployable module actually changed
          if [ "$FRONTEND_CHANGED" == "true" ] || [ "$STORE_CHANGED" == "true" ] || [ "$TTS_API_CHANGED" == "true" ] || [ "$MORPHOLOGY_API_CHANGED" == "true" ] || [ "$AUTH_CHANGED" == "true" ]; then
            echo "has_deploy_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_deploy_changes=false" >> $GITHUB_OUTPUT
          fi

          echo "✅ Build $BUILD_ID created"
          cat /tmp/manifest.json

      - name: Build summary
        if: steps.should_build.outputs.build == 'true'
        run: |
          echo "## Build Complete ✅" >> $GITHUB_STEP_SUMMARY
          echo "- **Build ID**: ${{ steps.build.outputs.build_id }}" >> $GITHUB_STEP_SUMMARY
          echo "- **SHA**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Deploy command:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "gh workflow run deploy.yml -f build_id=${{ steps.build.outputs.build_id }} -f environment=dev" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      - name: Notify Slack (build failure)
        if: failure() && env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"attachments\":[{\"color\":\"#ff0000\",\"title\":\"🚨 Build FAILED\",\"text\":\"Branch: ${{ github.ref_name }}\nSHA: ${{ github.sha }}\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\",\"footer\":\"HAK CI/CD\"}]}"

  deploy-dev:
    name: Deploy to Dev
    needs: build
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' && needs.build.outputs.build_id != '' && needs.build.outputs.has_deploy_changes == 'true'
    uses: ./.github/workflows/deploy.yml
    with:
      build_id: ${{ needs.build.outputs.build_id }}
      environment: dev
    secrets: inherit
