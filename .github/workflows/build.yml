name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read
  packages: read

jobs:
  build:
    name: Build All
    runs-on: ubuntu-latest
    
    outputs:
      build_id: ${{ steps.build-id.outputs.id }}
    
    steps:
      - name: Generate build ID
        id: build-id
        run: echo "id=${{ github.sha }}-$(date +%Y%m%d-%H%M%S)" >> $GITHUB_OUTPUT
      
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      
      - name: Configure npm registry auth
        run: |
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc
          echo "@askend-lab:registry=https://npm.pkg.github.com" >> ~/.npmrc
      
      - name: Install dependencies
        run: pnpm install
      
      - name: Run tests
        run: pnpm exec jest --passWithNoTests
      
      - name: Build frontend
        run: pnpm --filter @hak/frontend build
      
      - name: Build SimpleStore
        run: pnpm --filter simplestore build
      
      - name: Build Audio API
        run: pnpm --filter audio-api build
      
      - name: Build Merlin API
        run: pnpm --filter merlin-api build
      
      - name: Build Vabamorf API
        working-directory: packages/vabamorf-api
        run: |
          npm ci
          npx tsc
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::465168436856:role/GitHubActionsRole
          aws-region: eu-west-1
      
      - name: Upload all artifacts to S3
        run: |
          BUILD_ID="${{ steps.build-id.outputs.id }}"
          S3_PATH="s3://askend-lab-artifacts/hak/builds/${BUILD_ID}"
          
          echo "Uploading build ${BUILD_ID} to S3..."
          
          # Frontend
          aws s3 sync packages/frontend/dist/ ${S3_PATH}/frontend/ --sse AES256
          
          # SimpleStore
          aws s3 sync packages/simplestore/dist/ ${S3_PATH}/simplestore/ --sse AES256
          
          # Audio API
          aws s3 sync packages/audio-api/dist/ ${S3_PATH}/audio-api/ --sse AES256
          
          # Merlin API
          aws s3 sync packages/merlin-api/dist/ ${S3_PATH}/merlin-api/ --sse AES256
          
          # Vabamorf API
          aws s3 sync packages/vabamorf-api/dist/ ${S3_PATH}/vabamorf-api/ --sse AES256
          
          # Save build metadata
          echo "{\"sha\": \"${{ github.sha }}\", \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\", \"ref\": \"${{ github.ref }}\"}" > /tmp/build-meta.json
          aws s3 cp /tmp/build-meta.json ${S3_PATH}/build-meta.json --sse AES256
          
          echo "✅ Build ${BUILD_ID} uploaded to S3"
      
      - name: Build summary
        run: |
          echo "## Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "- **Build ID**: ${{ steps.build-id.outputs.id }}" >> $GITHUB_STEP_SUMMARY
          echo "- **SHA**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Artifacts**: s3://askend-lab-artifacts/hak/builds/${{ steps.build-id.outputs.id }}/" >> $GITHUB_STEP_SUMMARY

  deploy-dev:
    name: Deploy to Dev
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: dev
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      
      - name: Configure npm registry auth
        run: |
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc
          echo "@askend-lab:registry=https://npm.pkg.github.com" >> ~/.npmrc
      
      - name: Install dependencies
        run: pnpm install
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::465168436856:role/GitHubActionsRole
          aws-region: eu-west-1
      
      - name: Download build artifacts from S3
        run: |
          BUILD_ID="${{ needs.build.outputs.build_id }}"
          S3_PATH="s3://askend-lab-artifacts/hak/builds/${BUILD_ID}"
          
          mkdir -p artifacts
          aws s3 sync ${S3_PATH}/frontend/ artifacts/frontend/
          aws s3 sync ${S3_PATH}/simplestore/ artifacts/simplestore/
          aws s3 sync ${S3_PATH}/audio-api/ artifacts/audio-api/
          aws s3 sync ${S3_PATH}/merlin-api/ artifacts/merlin-api/
          aws s3 sync ${S3_PATH}/vabamorf-api/ artifacts/vabamorf-api/
      
      - name: Deploy Frontend to S3
        run: |
          aws s3 sync artifacts/frontend/ s3://hak-dev-website/ --delete
      
      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation --distribution-id E232G8TMX7360Y --paths "/*"
      
      - name: Install Serverless
        run: npm install -g serverless@3
      
      - name: Deploy SimpleStore
        working-directory: packages/simplestore
        run: |
          cp -r ../../artifacts/simplestore/* dist/ 2>/dev/null || mkdir -p dist
          serverless deploy --stage dev --region eu-west-1
      
      - name: Deploy Audio API
        working-directory: packages/audio-api
        run: |
          cp -r ../../artifacts/audio-api/* dist/ 2>/dev/null || mkdir -p dist
          serverless deploy --stage dev --region eu-west-1
      
      - name: Deploy Merlin API
        working-directory: packages/merlin-api
        run: |
          cp -r ../../artifacts/merlin-api/* dist/ 2>/dev/null || mkdir -p dist
          serverless create_domain --stage dev || true
          serverless deploy --stage dev --force
      
      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      
      - name: Deploy Vabamorf API
        working-directory: packages/vabamorf-api
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          # Restore dist/ directory structure from artifacts
          # Note: Build uploads dist/ which contains src/, so artifacts has src/*.js
          rm -rf dist
          mkdir -p dist
          cp -r ../../artifacts/vabamorf-api/* dist/
          npm ci
          docker build -t $ECR_REGISTRY/vabamorf-api:${{ github.sha }} -t $ECR_REGISTRY/vabamorf-api:latest .
          docker push $ECR_REGISTRY/vabamorf-api:${{ github.sha }}
          docker push $ECR_REGISTRY/vabamorf-api:latest
          npm install --save-dev serverless-domain-manager
          serverless create_domain --stage dev || true
          serverless deploy --stage dev
      
      - name: Deployment summary
        run: |
          echo "## Dev Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "- **Build ID**: ${{ needs.build.outputs.build_id }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Frontend**: https://hak-dev.askend-lab.com" >> $GITHUB_STEP_SUMMARY
          echo "- **API**: https://hak-api-dev.askend-lab.com" >> $GITHUB_STEP_SUMMARY
