name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        type: choice
        options:
          - dev
          - prod
      build_timestamp:
        description: 'Build timestamp to deploy (leave empty for new build)'
        required: false
        type: string

permissions:
  id-token: write
  contents: read
  packages: read

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      
      - name: Configure npm registry auth
        run: |
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc
          echo "@askend-lab:registry=https://npm.pkg.github.com" >> ~/.npmrc
      
      - name: Install dependencies
        run: pnpm install
      
      - name: Run DevBox PR checks
        if: github.event_name == 'pull_request'
        run: node node_modules/@askend-lab/devbox/packages/hooks/src/cli/index.js run pr-check --all-files
      
      - name: Run tests with coverage (PR)
        if: github.event_name == 'pull_request'
        run: pnpm dx
      
      - name: Run tests with coverage (push)
        if: github.event_name == 'push'
        run: |
          pnpm --filter @hak/frontend test
          pnpm --filter singletablelambda test
          pnpm --filter hak test
          cd audio-api && npm ci && npm test
      
      - name: Build frontend
        run: pnpm --filter @hak/frontend build
      
      - name: Generate build timestamp
        id: timestamp
        run: echo "timestamp=$(date +%Y%m%d-%H%M%S)" >> $GITHUB_OUTPUT
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-${{ steps.timestamp.outputs.timestamp }}
          path: packages/frontend/dist/
          retention-days: 30
    
    outputs:
      build_timestamp: ${{ steps.timestamp.outputs.timestamp }}

  build-vabamorf-api:
    name: Build Vabamorf API
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        working-directory: vabamorf-api
        run: npm ci
      
      - name: Run tests
        working-directory: vabamorf-api
        run: npm test
      
      - name: Build TypeScript
        working-directory: vabamorf-api
        run: npx tsc
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vabamorf-api-dist
          path: vabamorf-api/dist/
          retention-days: 30

  deploy-vabamorf-api:
    name: Deploy Vabamorf API
    needs: [build-and-test, build-vabamorf-api]
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'workflow_dispatch'
    
    strategy:
      matrix:
        include:
          - environment: dev
            auto: ${{ github.event_name == 'push' }}
          - environment: prod
            auto: false
    
    environment: ${{ matrix.environment }}
    
    steps:
      - name: Skip if not triggered
        if: |
          (github.event_name == 'workflow_dispatch' && github.event.inputs.environment != matrix.environment) ||
          (github.event_name == 'push' && !matrix.auto)
        run: echo "Skipping deployment to ${{ matrix.environment }}" && exit 0
      
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: vabamorf-api-dist
          path: vabamorf-api/dist/
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::465168436856:role/GitHubActionsRole
          aws-region: eu-west-1
      
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      
      - name: Build and push Docker image
        working-directory: vabamorf-api
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: askend-lab
          IMAGE_TAG: vabamorf-api-${{ matrix.environment }}-${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:vabamorf-api-${{ matrix.environment }}-latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:vabamorf-api-${{ matrix.environment }}-latest
      
      - name: Setup Node.js for Serverless
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Serverless Framework
        run: npm install -g serverless@3
      
      - name: Deploy with Serverless
        working-directory: vabamorf-api
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          serverless deploy --stage ${{ matrix.environment }} --region eu-west-1
      
      - name: Deployment summary
        run: |
          echo "✅ Deployed Vabamorf API to ${{ matrix.environment }}"

  build-audio-api:
    name: Build Audio API
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        working-directory: audio-api
        run: npm ci
      
      - name: Run tests
        working-directory: audio-api
        run: npm test
      
      - name: Build TypeScript
        working-directory: audio-api
        run: npm run build
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: audio-api-dist
          path: audio-api/dist/
          retention-days: 30

  deploy-audio-api:
    name: Deploy Audio API
    needs: [build-and-test, build-audio-api]
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'workflow_dispatch'
    
    strategy:
      matrix:
        include:
          - environment: dev
            auto: ${{ github.event_name == 'push' }}
          - environment: prod
            auto: false
    
    environment: ${{ matrix.environment }}
    
    steps:
      - name: Skip if not triggered
        if: |
          (github.event_name == 'workflow_dispatch' && github.event.inputs.environment != matrix.environment) ||
          (github.event_name == 'push' && !matrix.auto)
        run: echo "Skipping deployment to ${{ matrix.environment }}" && exit 0
      
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: audio-api-dist
          path: audio-api/dist/
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::465168436856:role/GitHubActionsRole
          aws-region: eu-west-1
      
      - name: Setup Node.js for Serverless
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Serverless Framework
        run: npm install -g serverless@3
      
      - name: Deploy with Serverless
        working-directory: audio-api
        run: |
          serverless deploy --stage ${{ matrix.environment }} --region eu-west-1
      
      - name: Deployment summary
        run: |
          echo "✅ Deployed Audio API to ${{ matrix.environment }}"

  test-audio-api-e2e:
    name: Test Audio API E2E
    needs: deploy-audio-api
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'workflow_dispatch'
    
    strategy:
      matrix:
        include:
          - environment: dev
            auto: ${{ github.event_name == 'push' }}
          - environment: prod
            auto: false
    
    steps:
      - name: Skip if not triggered
        if: |
          (github.event_name == 'workflow_dispatch' && github.event.inputs.environment != matrix.environment) ||
          (github.event_name == 'push' && !matrix.auto)
        run: echo "Skipping E2E tests for ${{ matrix.environment }}" && exit 0
      
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        working-directory: audio-api
        run: npm ci
      
      - name: Run E2E tests
        working-directory: audio-api
        env:
          STAGE: ${{ matrix.environment }}
        run: npm run test:e2e

  build-audio-worker:
    name: Build Audio Worker
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        working-directory: audio-worker
        run: npm ci
      
      - name: Run tests
        working-directory: audio-worker
        run: npm test
      
      - name: Build TypeScript
        working-directory: audio-worker
        run: npm run build
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: audio-worker-dist
          path: |
            audio-worker/dist/
            audio-worker/package*.json
            audio-worker/Dockerfile
          retention-days: 30

  deploy-audio-worker:
    name: Deploy Audio Worker
    needs: [build-and-test, build-audio-worker]
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'workflow_dispatch'
    
    strategy:
      matrix:
        include:
          - environment: dev
            auto: ${{ github.event_name == 'push' }}
          - environment: prod
            auto: false
    
    environment: ${{ matrix.environment }}
    
    steps:
      - name: Skip if not triggered
        if: |
          (github.event_name == 'workflow_dispatch' && github.event.inputs.environment != matrix.environment) ||
          (github.event_name == 'push' && !matrix.auto)
        run: echo "Skipping deployment to ${{ matrix.environment }}" && exit 0
      
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: audio-worker-dist
          path: audio-worker/
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::465168436856:role/GitHubActionsRole
          aws-region: eu-west-1
      
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      
      - name: Build and push Docker image
        working-directory: audio-worker
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: askend-lab
          IMAGE_TAG: audio-worker-${{ matrix.environment }}-${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:audio-worker-${{ matrix.environment }}-latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:audio-worker-${{ matrix.environment }}-latest
      
      - name: Update ECS service
        env:
          CLUSTER_NAME: hak-${{ matrix.environment }}
          SERVICE_NAME: audio-worker
        run: |
          aws ecs update-service --cluster $CLUSTER_NAME --service $SERVICE_NAME --force-new-deployment || echo "Service not yet created"
      
      - name: Deployment summary
        run: |
          echo "✅ Deployed Audio Worker to ${{ matrix.environment }}"

  deploy-to-aws:
    name: Deploy to AWS
    needs: build-and-test
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'workflow_dispatch'
    
    strategy:
      matrix:
        include:
          - environment: dev
            auto: ${{ github.event_name == 'push' }}
          - environment: prod
            auto: false
    
    environment: ${{ matrix.environment }}
    
    steps:
      - name: Skip if not triggered
        if: |
          (github.event_name == 'workflow_dispatch' && github.event.inputs.environment != matrix.environment) ||
          (github.event_name == 'push' && !matrix.auto)
        run: echo "Skipping deployment to ${{ matrix.environment }}" && exit 0
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::465168436856:role/GitHubActionsRole
          aws-region: eu-west-1
      
      - name: Determine build timestamp
        id: build
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ -n "${{ github.event.inputs.build_timestamp }}" ]; then
            echo "timestamp=${{ github.event.inputs.build_timestamp }}" >> $GITHUB_OUTPUT
          else
            echo "timestamp=${{ needs.build-and-test.outputs.build_timestamp }}" >> $GITHUB_OUTPUT
          fi
      
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist-${{ steps.build.outputs.timestamp }}
          path: dist/
      
      - name: Upload to artifacts bucket
        run: |
          aws s3 sync dist/ s3://askend-lab-artifacts/hak/builds/${{ steps.build.outputs.timestamp }}/ --delete --sse AES256
      
      - name: Deploy to website bucket
        run: |
          aws s3 sync s3://askend-lab-artifacts/hak/builds/${{ steps.build.outputs.timestamp }}/ s3://hak-${{ matrix.environment }}-website/ --delete
      
      # TEMPORARY: CloudFront cache invalidation disabled until AWS account verification
      # - name: Get CloudFront distribution ID
      #   id: cloudfront
      #   run: |
      #     DIST_ID=$(aws cloudfront list-distributions \
      #       --query "DistributionList.Items[?Aliases.Items[?contains(@, 'hak${{ matrix.environment == 'prod' && '' || format('-{0}', matrix.environment) }}.askend-lab.com')]].Id | [0]" \
      #       --output text)
      #     echo "distribution_id=$DIST_ID" >> $GITHUB_OUTPUT
      # 
      # - name: Invalidate CloudFront cache
      #   run: |
      #     aws cloudfront create-invalidation \
      #       --distribution-id ${{ steps.cloudfront.outputs.distribution_id }} \
      #       --paths "/*"
      
      - name: Deployment summary
        run: |
          echo "✅ Deployed build ${{ steps.build.outputs.timestamp }} to ${{ matrix.environment }}"
          echo "🌐 URL: http://hak${{ matrix.environment == 'prod' && '' || format('-{0}', matrix.environment) }}.askend-lab.com"
          echo "⚠️  TEMPORARY: Using S3 static hosting (HTTP only) until AWS account verification"
