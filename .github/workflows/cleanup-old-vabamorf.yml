name: Cleanup Old Vabamorf Resources

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to cleanup'
        required: true
        type: choice
        options:
          - dev
          - prod

permissions:
  id-token: write
  contents: read

jobs:
  cleanup:
    name: Delete Old Vabamorf AWS Resources
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::465168436856:role/GitHubActionsRole
          aws-region: eu-west-1
      
      - name: Set domain name
        id: domain
        run: |
          if [ "${{ github.event.inputs.environment }}" == "prod" ]; then
            echo "name=vabamorf.askend-lab.com" >> $GITHUB_OUTPUT
          else
            echo "name=vabamorf-${{ github.event.inputs.environment }}.askend-lab.com" >> $GITHUB_OUTPUT
          fi
      
      - name: Delete API Gateway mappings
        continue-on-error: true
        run: |
          echo "Deleting API mappings for ${{ steps.domain.outputs.name }}..."
          MAPPINGS=$(aws apigatewayv2 get-api-mappings --domain-name ${{ steps.domain.outputs.name }} --query 'Items[*].ApiMappingId' --output text 2>/dev/null || echo "")
          for mapping in $MAPPINGS; do
            echo "Deleting mapping: $mapping"
            aws apigatewayv2 delete-api-mapping --api-mapping-id $mapping --domain-name ${{ steps.domain.outputs.name }} || true
          done
      
      - name: Delete custom domain
        continue-on-error: true
        run: |
          echo "Deleting domain ${{ steps.domain.outputs.name }}..."
          aws apigatewayv2 delete-domain-name --domain-name ${{ steps.domain.outputs.name }} || echo "Domain not found or already deleted"
      
      - name: Delete Route53 record
        continue-on-error: true
        run: |
          echo "Deleting Route53 record for ${{ steps.domain.outputs.name }}..."
          HOSTED_ZONE_ID="Z08749823PH6RLXNTUZOF"
          
          # Get the current record
          RECORD=$(aws route53 list-resource-record-sets --hosted-zone-id $HOSTED_ZONE_ID \
            --query "ResourceRecordSets[?Name=='${{ steps.domain.outputs.name }}.']" --output json)
          
          if [ "$RECORD" != "[]" ]; then
            # Create change batch to delete
            cat > /tmp/delete-record.json << EOF
          {
            "Changes": [{
              "Action": "DELETE",
              "ResourceRecordSet": $(echo "$RECORD" | jq '.[0]')
            }]
          }
          EOF
            aws route53 change-resource-record-sets --hosted-zone-id $HOSTED_ZONE_ID --change-batch file:///tmp/delete-record.json || echo "Failed to delete Route53 record"
          else
            echo "No Route53 record found"
          fi
      
      - name: Find and delete API Gateway
        continue-on-error: true
        run: |
          echo "Finding Vabamorf API Gateway..."
          API_ID=$(aws apigatewayv2 get-apis --query "Items[?Name=='vabamorf-api-${{ github.event.inputs.environment }}'].ApiId" --output text 2>/dev/null || echo "")
          if [ -n "$API_ID" ] && [ "$API_ID" != "None" ]; then
            echo "Deleting API Gateway: $API_ID"
            aws apigatewayv2 delete-api --api-id $API_ID
          else
            echo "No API Gateway found with name vabamorf-api-${{ github.event.inputs.environment }}"
          fi
      
      - name: Delete Lambda function
        continue-on-error: true
        run: |
          echo "Deleting Lambda function vabamorf-api-${{ github.event.inputs.environment }}..."
          aws lambda delete-function --function-name vabamorf-api-${{ github.event.inputs.environment }} || echo "Lambda not found or already deleted"
      
      - name: Delete CloudWatch log group
        continue-on-error: true
        run: |
          echo "Deleting CloudWatch log group..."
          aws logs delete-log-group --log-group-name /aws/lambda/vabamorf-api-${{ github.event.inputs.environment }} || echo "Log group not found or already deleted"
      
      - name: Delete IAM role
        continue-on-error: true
        run: |
          ROLE_NAME="vabamorf-lambda-role-${{ github.event.inputs.environment }}"
          echo "Deleting IAM role $ROLE_NAME..."
          
          # Detach policies first
          POLICIES=$(aws iam list-attached-role-policies --role-name $ROLE_NAME --query 'AttachedPolicies[*].PolicyArn' --output text 2>/dev/null || echo "")
          for policy in $POLICIES; do
            echo "Detaching policy: $policy"
            aws iam detach-role-policy --role-name $ROLE_NAME --policy-arn $policy || true
          done
          
          # Delete inline policies
          INLINE=$(aws iam list-role-policies --role-name $ROLE_NAME --query 'PolicyNames' --output text 2>/dev/null || echo "")
          for policy in $INLINE; do
            echo "Deleting inline policy: $policy"
            aws iam delete-role-policy --role-name $ROLE_NAME --policy-name $policy || true
          done
          
          # Delete role
          aws iam delete-role --role-name $ROLE_NAME || echo "Role not found or already deleted"
      
      - name: Summary
        run: |
          echo "✅ Cleanup complete for ${{ github.event.inputs.environment }}"
          echo "You can now run the Serverless deployment"
