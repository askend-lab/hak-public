name: Deploy Merlin Infrastructure

on:
  push:
    branches: [main]
    paths:
      - "infra/merlin/**"
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy"
        required: true
        type: choice
        options:
          - dev
          - prod

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy Merlin Infrastructure
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: ${{ github.event.inputs.environment || 'dev' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-west-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: 1.6.0

      - name: Terraform Init
        working-directory: infra/merlin
        run: |
          terraform init \
            -backend-config="bucket=askend-lab-terraform-state" \
            -backend-config="dynamodb_table=askend-lab-terraform-locks" \
            -backend-config="key=merlin/${{ github.event.inputs.environment || 'dev' }}/terraform.tfstate"

      - name: Import ECR repository (one-time)
        working-directory: infra/merlin
        run: |
          terraform import -var="env=${{ github.event.inputs.environment || 'dev' }}" aws_ecr_repository.merlin_worker merlin-worker 2>/dev/null || echo "Already imported or doesn't exist"
        continue-on-error: true

      - name: Terraform Plan
        working-directory: infra/merlin
        run: |
          terraform plan -var="env=${{ github.event.inputs.environment || 'dev' }}" -out=tfplan

      - name: Terraform Apply
        working-directory: infra/merlin
        run: |
          terraform apply -auto-approve tfplan

      - name: Output values
        working-directory: infra/merlin
        run: |
          echo "## Merlin Infrastructure Outputs" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- SQS Queue: $(terraform output -raw sqs_queue_url)" >> $GITHUB_STEP_SUMMARY
          echo "- S3 Bucket: $(terraform output -raw s3_bucket_name)" >> $GITHUB_STEP_SUMMARY
          echo "- ECR Repo: $(terraform output -raw ecr_repository_url)" >> $GITHUB_STEP_SUMMARY
          echo "- ECS Cluster: $(terraform output -raw ecs_cluster_name)" >> $GITHUB_STEP_SUMMARY
