name: Deploy

on:
  workflow_call:
    inputs:
      build_id:
        required: true
        type: string
      environment:
        required: true
        type: string
      force:
        required: false
        type: boolean
        default: false

  workflow_dispatch:
    inputs:
      build_id:
        description: "Build ID to deploy (e.g., BUILD-20260112123456)"
        required: true
        type: string
      environment:
        description: "Environment to deploy to"
        required: true
        type: choice
        options:
          - dev
          - prod
      force:
        description: "Force deploy all modules (bypass smart diff)"
        required: false
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read
  packages: read

concurrency:
  group: deploy-${{ inputs.environment }}
  cancel-in-progress: false

env:
  ARTIFACTS_PREFIX: hak/builds
  DEPLOYMENTS_PREFIX: hak/deployments

jobs:
  deploy:
    name: Deploy ${{ inputs.build_id }} to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          cache: "pnpm"

      - name: Configure npm registry auth
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -n "$NPM_TOKEN" ]; then
            echo "//npm.pkg.github.com/:_authToken=$NPM_TOKEN" > ~/.npmrc
            echo "@${{ github.repository_owner }}:registry=https://npm.pkg.github.com" >> ~/.npmrc
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-west-1

      - name: Load config from SSM
        run: |
          echo "ARTIFACTS_BUCKET=$(aws ssm get-parameter --name /hak/shared/artifacts-bucket --query Parameter.Value --output text)" >> $GITHUB_ENV
          echo "CF_DIST_DEV=$(aws ssm get-parameter --name /hak/shared/cloudfront-dist-dev --query Parameter.Value --output text)" >> $GITHUB_ENV
          echo "CF_DIST_PROD=$(aws ssm get-parameter --name /hak/shared/cloudfront-dist-prod --query Parameter.Value --output text)" >> $GITHUB_ENV
          echo "COGNITO_USER_POOL_ARN=$(aws ssm get-parameter --name /hak/shared/cognito-user-pool-arn --query Parameter.Value --output text)" >> $GITHUB_ENV
          echo "COGNITO_USER_POOL_ID=$(aws ssm get-parameter --name /hak/shared/cognito-user-pool-id --query Parameter.Value --output text 2>/dev/null || aws ssm get-parameter --name /hak/dev/cognito-user-pool-id --query Parameter.Value --output text)" >> $GITHUB_ENV
          echo "COGNITO_CLIENT_ID=$(aws ssm get-parameter --name /hak/shared/cognito-client-id --query Parameter.Value --output text 2>/dev/null || aws ssm get-parameter --name /hak/dev/cognito-client-id --query Parameter.Value --output text)" >> $GITHUB_ENV
          echo "DOMAIN_NAME=$(aws ssm get-parameter --name /hak/shared/domain-name --query Parameter.Value --output text)" >> $GITHUB_ENV
          echo "HOSTED_ZONE_ID=$(aws ssm get-parameter --name /hak/shared/hosted-zone-id --query Parameter.Value --output text)" >> $GITHUB_ENV
          echo "CERTIFICATE_ARN=$(aws ssm get-parameter --name /hak/shared/certificate-arn --query Parameter.Value --output text)" >> $GITHUB_ENV
          echo "AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)" >> $GITHUB_ENV

      - name: Validate required config
        run: |
          FAILED=false
          for var in COGNITO_USER_POOL_ARN DOMAIN_NAME HOSTED_ZONE_ID CERTIFICATE_ARN AWS_ACCOUNT_ID; do
            val="${!var}"
            if [ -z "$val" ]; then
              echo "❌ $var is empty or not set"
              FAILED=true
            fi
          done
          # Validate ARN format
          if [[ -n "$COGNITO_USER_POOL_ARN" && ! "$COGNITO_USER_POOL_ARN" =~ ^arn:aws:cognito-idp: ]]; then
            echo "❌ COGNITO_USER_POOL_ARN does not look like a valid Cognito ARN: $COGNITO_USER_POOL_ARN"
            FAILED=true
          fi
          [ "$FAILED" == "true" ] && exit 1
          echo "✅ All required config validated"

      - name: Get build manifest and current state
        id: state
        run: |
          BUILD_ID="${{ inputs.build_id }}"
          ENV="${{ inputs.environment }}"
          FORCE="${{ inputs.force }}"

          # Download build manifest
          S3_BUILD="s3://$ARTIFACTS_BUCKET/$ARTIFACTS_PREFIX/$BUILD_ID"
          if ! aws s3 cp ${S3_BUILD}/manifest.json /tmp/build-manifest.json; then
            echo "❌ Build $BUILD_ID not found"
            exit 1
          fi
          echo "Build manifest:" && cat /tmp/build-manifest.json

          # Download current deployment state
          S3_DEPLOY="s3://$ARTIFACTS_BUCKET/$DEPLOYMENTS_PREFIX/${ENV}.json"
          if ! aws s3 cp ${S3_DEPLOY} /tmp/current-state.json 2>/dev/null; then
            echo "No existing deployment, will deploy all"
            echo '{"modules":{}}' > /tmp/current-state.json
          fi

          # Use jq for reliable JSON parsing
          get_module() { jq -r ".modules.\"$1\" // \"\"" "$2"; }

          # Compare modules and determine what to deploy
          for module in frontend store tts-api morphology-api auth; do
            BUILD_SHA=$(get_module "$module" /tmp/build-manifest.json)
            CURRENT_SHA=$(get_module "$module" /tmp/current-state.json)

            # Special handling for frontend: use S3 ETag for true content comparison
            if [ "$module" == "frontend" ]; then
              BUILD_ETAG=$(aws s3api head-object --bucket $ARTIFACTS_BUCKET --key $ARTIFACTS_PREFIX/$BUILD_ID/frontend/index.html --query ETag --output text 2>/dev/null || echo "")
              TARGET_BUCKET="hak-${ENV}-website"
              [ "$ENV" == "prod" ] && TARGET_BUCKET="hak-prod-website"
              CURRENT_ETAG=$(aws s3api head-object --bucket $TARGET_BUCKET --key index.html --query ETag --output text 2>/dev/null || echo "")
              SHOULD_DEPLOY=$( [ "$FORCE" == "true" ] || [ "$BUILD_ETAG" != "$CURRENT_ETAG" ] && echo true || echo false )
              echo "Frontend ETags: build=$BUILD_ETAG current=$CURRENT_ETAG"
            else
              SHOULD_DEPLOY=$( [ "$FORCE" == "true" ] || [ "$BUILD_SHA" != "$CURRENT_SHA" ] && echo true || echo false )
            fi

            # Convert module name to output variable format (tts-api -> deploy_tts_api)
            OUTPUT_NAME="deploy_$(echo $module | tr '-' '_')"
            echo "$OUTPUT_NAME=$SHOULD_DEPLOY" >> $GITHUB_OUTPUT
            echo "$module: BUILD=$BUILD_SHA CURRENT=$CURRENT_SHA -> $( [ "$SHOULD_DEPLOY" == "true" ] && echo DEPLOY || echo skip )"
          done

          # Output vabamorf SHA for ECR image URI construction
          echo "morphology_sha=$(get_module "morphology-api" /tmp/build-manifest.json)" >> $GITHUB_OUTPUT

      - name: Download build artifacts
        run: |
          BUILD_ID="${{ inputs.build_id }}"
          S3_BUILD="s3://$ARTIFACTS_BUCKET/$ARTIFACTS_PREFIX/$BUILD_ID"
          mkdir -p artifacts

          [ "${{ steps.state.outputs.deploy_frontend }}" == "true" ] && aws s3 sync ${S3_BUILD}/frontend/ artifacts/frontend/
          [ "${{ steps.state.outputs.deploy_store }}" == "true" ] && aws s3 sync ${S3_BUILD}/store/ artifacts/store/
          [ "${{ steps.state.outputs.deploy_tts_api }}" == "true" ] && aws s3 sync ${S3_BUILD}/tts-api/ artifacts/tts-api/

          echo "✅ Downloaded artifacts"

      - name: Deploy Frontend
        if: steps.state.outputs.deploy_frontend == 'true'
        run: |
          ENV="${{ inputs.environment }}"
          BUILD_ID="${{ inputs.build_id }}"
          BUCKET="hak-${ENV}-website"
          [ "$ENV" == "prod" ] && BUCKET="hak-prod-website"
          CF_DIST_ID="$( [ "$ENV" == "prod" ] && echo $CF_DIST_PROD || echo $CF_DIST_DEV )"

          # Generate build-info.json from manifest
          MANIFEST="/tmp/build-manifest.json"
          GIT_SHA=$(jq -r '.git_sha' $MANIFEST)
          BUILD_TIME=$(jq -r '.timestamp' $MANIFEST)
          DEPLOY_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Get commit info from git
          COMMIT_MSG=$(git log -1 --format=%s $GIT_SHA 2>/dev/null || echo "")
          BRANCH=$(git branch --contains $GIT_SHA --format='%(refname:short)' 2>/dev/null | head -1 || echo "main")

          cat > artifacts/frontend/build-info.json << EOF
          {
            "buildId": "$BUILD_ID",
            "commitHash": "${GIT_SHA:0:7}",
            "commitHashFull": "$GIT_SHA",
            "branch": "$BRANCH",
            "message": "$COMMIT_MSG",
            "builtAt": "$BUILD_TIME",
            "deployedAt": "$DEPLOY_TIME",
            "environment": "$ENV"
          }
          EOF

          aws s3 cp artifacts/frontend/ s3://${BUCKET}/ --recursive
          aws cloudfront create-invalidation --distribution-id $CF_DIST_ID --paths "/*"
          echo "✅ Frontend deployed to $BUCKET with build-info.json"

      - name: Install Serverless
        if: steps.state.outputs.deploy_store == 'true' || steps.state.outputs.deploy_tts_api == 'true' || steps.state.outputs.deploy_morphology_api == 'true' || steps.state.outputs.deploy_auth == 'true'
        run: npm install -g serverless@3.40.0

      - name: Deploy Store
        if: steps.state.outputs.deploy_store == 'true'
        working-directory: packages/store
        run: |
          mkdir -p dist && cp -r ../../artifacts/store/* dist/ 2>/dev/null || true
          serverless deploy --stage ${{ inputs.environment }} --region eu-west-1
          echo "✅ Store deployed"

      - name: Deploy TTS API
        if: steps.state.outputs.deploy_tts_api == 'true'
        working-directory: packages/tts-api
        run: |
          mkdir -p dist && cp -r ../../artifacts/tts-api/* dist/ 2>/dev/null || true
          serverless deploy --stage ${{ inputs.environment }}
          echo "✅ TTS API deployed"

      - name: Login to ECR
        if: steps.state.outputs.deploy_morphology_api == 'true'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@062b18b96a7aff071d4dc91bc00c4c1a7945b076 # v2

      - name: Deploy Morphology API
        if: steps.state.outputs.deploy_morphology_api == 'true'
        working-directory: packages/morphology-api
        env:
          VABAMORF_IMAGE_URI: ${{ steps.login-ecr.outputs.registry }}/vabamorf-api:${{ steps.state.outputs.morphology_sha }}
          BUILDX_NO_DEFAULT_ATTESTATIONS: 1
        run: |
          echo "Using ECR image: $VABAMORF_IMAGE_URI"
          serverless deploy --stage ${{ inputs.environment }}
          echo "✅ Morphology API deployed"

      - name: Deploy Auth
        if: steps.state.outputs.deploy_auth == 'true'
        working-directory: packages/auth
        run: |
          serverless deploy --stage ${{ inputs.environment }} --region eu-west-1
          echo "✅ Auth deployed"

      - name: Update deployment state
        run: |
          BUILD_ID="${{ inputs.build_id }}"
          ENV="${{ inputs.environment }}"

          # Build deployment state from manifest using jq
          jq --arg env "$ENV" --arg build "$BUILD_ID" --arg time "$(date -u +%Y-%m-%dT%H:%M:%SZ)" '
            {
              environment: $env,
              build_id: $build,
              deployed_at: $time,
              modules: .modules
            }
          ' /tmp/build-manifest.json > /tmp/deployment-state.json

          aws s3 cp /tmp/deployment-state.json s3://$ARTIFACTS_BUCKET/$DEPLOYMENTS_PREFIX/${ENV}.json --sse AES256
          echo "✅ Deployment state updated:"
          cat /tmp/deployment-state.json

      - name: Cleanup orphaned API Gateway custom domains
        run: |
          ENV="${{ inputs.environment }}"
          DOMAIN="$DOMAIN_NAME"

          # Custom domains created by serverless-domain-manager that bypass CloudFront WAF.
          # These must not exist — all traffic must go through CloudFront.
          # Includes both HTTP API (v2) domains (Merlin, Vabamorf) and REST API (v1) domains (SimpleStore, Auth).
          DOMAINS_TO_DELETE=(
            "merlin-${ENV}.${DOMAIN}"
            "vabamorf-${ENV}.${DOMAIN}"
            "hak-api-${ENV}.${DOMAIN}"
          )
          # Prod uses different naming
          if [ "$ENV" == "prod" ]; then
            DOMAINS_TO_DELETE=(
              "merlin.${DOMAIN}"
              "vabamorf.${DOMAIN}"
              "merlin-prod.${DOMAIN}"
              "vabamorf-prod.${DOMAIN}"
              "hak-api.${DOMAIN}"
              "hak-api-prod.${DOMAIN}"
            )
          fi

          for domain in "${DOMAINS_TO_DELETE[@]}"; do
            echo "Checking $domain..."
            # Delete API mapping first, then custom domain
            # Check both HTTP API (v2) and REST API (v1) custom domains
            if aws apigatewayv2 get-domain-name --domain-name "$domain" 2>/dev/null; then
              echo "⚠️  Found orphaned custom domain: $domain — deleting"

              # Get Route53 target BEFORE deleting the custom domain
              TARGET=$(aws apigatewayv2 get-domain-name --domain-name "$domain" --query 'DomainNameConfigurations[0].ApiGatewayDomainName' --output text 2>/dev/null || true)

              # Delete API mappings first, then custom domain
              MAPPINGS=$(aws apigatewayv2 get-api-mappings --domain-name "$domain" --query 'Items[].ApiMappingId' --output text 2>/dev/null || true)
              for mapping in $MAPPINGS; do
                aws apigatewayv2 delete-api-mapping --domain-name "$domain" --api-mapping-id "$mapping" || true
              done
              aws apigatewayv2 delete-domain-name --domain-name "$domain" || true
              echo "✅ Deleted custom domain: $domain"

              # Delete Route53 A record pointing to the old custom domain
              if [ -n "$TARGET" ] && [ "$TARGET" != "None" ]; then
                aws route53 change-resource-record-sets --hosted-zone-id "$HOSTED_ZONE_ID" --change-batch "{
                  \"Changes\": [{
                    \"Action\": \"DELETE\",
                    \"ResourceRecordSet\": {
                      \"Name\": \"$domain\",
                      \"Type\": \"A\",
                      \"AliasTarget\": {
                        \"HostedZoneId\": \"ZLY8HYME6SFDD\",
                        \"DNSName\": \"$TARGET\",
                        \"EvaluateTargetHealth\": false
                      }
                    }
                  }]
                }" 2>/dev/null || true
                echo "✅ Deleted Route53 record for $domain"
              fi
            elif aws apigateway get-domain-name --domain-name "$domain" 2>/dev/null; then
              echo "⚠️  Found orphaned REST API domain: $domain — deleting"
              TARGET=$(aws apigateway get-domain-name --domain-name "$domain" --query 'regionalDomainName' --output text 2>/dev/null || true)
              for bp in $(aws apigateway get-base-path-mappings --domain-name "$domain" --query 'items[].basePath' --output text 2>/dev/null || true); do
                aws apigateway delete-base-path-mapping --domain-name "$domain" --base-path "$bp" || true
              done
              aws apigateway delete-domain-name --domain-name "$domain" || true
              if [ -n "$TARGET" ] && [ "$TARGET" != "None" ]; then
                aws route53 change-resource-record-sets --hosted-zone-id "$HOSTED_ZONE_ID" --change-batch "{\"Changes\":[{\"Action\":\"DELETE\",\"ResourceRecordSet\":{\"Name\":\"$domain\",\"Type\":\"A\",\"AliasTarget\":{\"HostedZoneId\":\"ZLY8HYME6SFDD\",\"DNSName\":\"$TARGET\",\"EvaluateTargetHealth\":false}}}]}" 2>/dev/null || true
              fi
              echo "✅ Cleaned up $domain"
            else
              echo "✅ $domain — not found (already clean)"
            fi
          done

      - name: Smoke test (bash)
        id: smoke_bash
        continue-on-error: true
        run: |
          chmod +x scripts/smoke-test.sh
          ./scripts/smoke-test.sh ${{ inputs.environment }}
      - name: Smoke test (api-client)
        id: smoke_api
        continue-on-error: true
        working-directory: packages/api-client
        env:
          SMOKE_ENV: ${{ inputs.environment }}
        run: |
          npx jest --no-coverage --testPathPatterns=smoke 2>&1
          echo "✅ API client smoke tests passed (${{ inputs.environment }})"

      - name: Notify Slack (smoke test failure)
        if: (steps.smoke_bash.outcome == 'failure' || steps.smoke_api.outcome == 'failure') && env.SLACK_WEBHOOK_URL != ''
        env: { SLACK_WEBHOOK_URL: "${{ secrets.SLACK_WEBHOOK_URL }}" }
        run: 'curl -s -X POST "$SLACK_WEBHOOK_URL" -H "Content-Type: application/json" -d "{\"attachments\":[{\"color\":\"#ffaa00\",\"title\":\"⚠️ Smoke tests failed (${{ inputs.environment }})\",\"text\":\"Deploy succeeded but smoke tests failed.\\nBuild: ${{ inputs.build_id }}\\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\",\"footer\":\"HAK CI/CD\"}]}"'
      - name: Summary
        run: |
          ENV="${{ inputs.environment }}"
          echo "## Deployment Complete ✅" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: $ENV" >> $GITHUB_STEP_SUMMARY
          echo "- **Build ID**: ${{ inputs.build_id }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Modules:" >> $GITHUB_STEP_SUMMARY
          [ "${{ steps.state.outputs.deploy_frontend }}" == "true" ] && echo "- ✅ frontend" >> $GITHUB_STEP_SUMMARY || echo "- ⏭️ frontend (unchanged)" >> $GITHUB_STEP_SUMMARY
          [ "${{ steps.state.outputs.deploy_store }}" == "true" ] && echo "- ✅ store" >> $GITHUB_STEP_SUMMARY || echo "- ⏭️ store (unchanged)" >> $GITHUB_STEP_SUMMARY
          [ "${{ steps.state.outputs.deploy_tts_api }}" == "true" ] && echo "- ✅ tts-api" >> $GITHUB_STEP_SUMMARY || echo "- ⏭️ tts-api (unchanged)" >> $GITHUB_STEP_SUMMARY
          [ "${{ steps.state.outputs.deploy_morphology_api }}" == "true" ] && echo "- ✅ morphology-api" >> $GITHUB_STEP_SUMMARY || echo "- ⏭️ morphology-api (unchanged)" >> $GITHUB_STEP_SUMMARY
          [ "${{ steps.state.outputs.deploy_auth }}" == "true" ] && echo "- ✅ auth" >> $GITHUB_STEP_SUMMARY || echo "- ⏭️ auth (unchanged)" >> $GITHUB_STEP_SUMMARY

      - name: Notify Slack (success)
        if: success() && env.SLACK_WEBHOOK_URL != ''
        env: { SLACK_WEBHOOK_URL: "${{ secrets.SLACK_WEBHOOK_URL }}" }
        run: 'curl -s -X POST "$SLACK_WEBHOOK_URL" -H "Content-Type: application/json" -d "{\"attachments\":[{\"color\":\"#00ff00\",\"title\":\"✅ Deploy ${{ inputs.environment }} succeeded\",\"text\":\"Build: ${{ inputs.build_id }}\\nSHA: ${{ github.sha }}\",\"footer\":\"HAK CI/CD\"}]}"'
      - name: Notify Slack (failure)
        if: failure() && env.SLACK_WEBHOOK_URL != ''
        env: { SLACK_WEBHOOK_URL: "${{ secrets.SLACK_WEBHOOK_URL }}" }
        run: 'curl -s -X POST "$SLACK_WEBHOOK_URL" -H "Content-Type: application/json" -d "{\"attachments\":[{\"color\":\"#ff0000\",\"title\":\"🚨 Deploy ${{ inputs.environment }} FAILED\",\"text\":\"Build: ${{ inputs.build_id }}\\nSHA: ${{ github.sha }}\\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\",\"footer\":\"HAK CI/CD\"}]}"'
