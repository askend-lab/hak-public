name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@c5ba7f7862a0f64c1b1a05fbac13e0b8e86ba08c # v4
        with:
          version: 10

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: pnpm

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        run: |
          npm version ${{ inputs.version }} --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Generate changelog
        run: |
          echo "## v${{ env.VERSION }}" > /tmp/changelog.md
          echo "" >> /tmp/changelog.md
          git log $(git describe --tags --abbrev=0 2>/dev/null || git rev-list --max-parents=0 HEAD)..HEAD --pretty=format:"- %s" >> /tmp/changelog.md

      - name: Commit and tag
        run: |
          git add package.json
          git commit -m "release: v${{ env.VERSION }}"
          git tag "v${{ env.VERSION }}"
          git push origin main --tags

      - name: Install dependencies
        run: pnpm install

      - name: Generate SBOM
        uses: anchore/sbom-action@28d71544de8eaf1b958d335707167c5f783590ad # v0
        with:
          format: spdx-json
          output-file: /tmp/sbom.spdx.json

      - name: Generate checksums
        run: |
          cd /tmp
          sha256sum sbom.spdx.json > checksums.sha256
          echo "SHA256 checksums:" && cat checksums.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          tag_name: "v${{ env.VERSION }}"
          body_path: /tmp/changelog.md
          generate_release_notes: true
          files: |
            /tmp/sbom.spdx.json
            /tmp/checksums.sha256

      - name: Generate SLSA provenance
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45 # v2
        with:
          subject-path: /tmp/sbom.spdx.json
