name: Cleanup Terraform Vabamorf State

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to cleanup'
        required: true
        type: choice
        options:
          - dev
          - prod

permissions:
  id-token: write
  contents: read

jobs:
  cleanup-terraform-state:
    name: Remove Vabamorf from Terraform State
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::465168436856:role/GitHubActionsRole
          aws-region: eu-west-1
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.7
      
      - name: Terraform Init
        working-directory: infra
        run: terraform init -backend-config="key=${{ github.event.inputs.environment }}/terraform.tfstate"
      
      - name: Force unlock any stale locks
        working-directory: infra
        continue-on-error: true
        run: |
          # Try to unlock any stale locks (will fail if no lock exists, that's ok)
          terraform force-unlock -force $(terraform show -json 2>/dev/null | jq -r '.values.root_module.resources[0].values.id // empty') 2>/dev/null || true
      
      - name: Remove Vabamorf resources from state
        working-directory: infra
        run: |
          echo "Removing Vabamorf resources from Terraform state..."
          
          # List of resources to remove
          RESOURCES=(
            "aws_lambda_function.vabamorf_api"
            "aws_apigatewayv2_api.vabamorf_api"
            "aws_apigatewayv2_integration.vabamorf_api"
            "aws_apigatewayv2_route.vabamorf_api"
            "aws_apigatewayv2_stage.vabamorf_api"
            "aws_lambda_permission.vabamorf_api_gateway"
            "aws_apigatewayv2_domain_name.vabamorf_api"
            "aws_apigatewayv2_api_mapping.vabamorf_api"
            "aws_route53_record.vabamorf_api"
            "aws_iam_role.vabamorf_lambda_role"
            "aws_iam_role_policy_attachment.vabamorf_lambda_basic"
            "aws_cloudwatch_log_group.vabamorf_api"
          )
          
          for resource in "${RESOURCES[@]}"; do
            echo "Removing $resource..."
            terraform state rm "$resource" 2>/dev/null || echo "  (not in state or already removed)"
          done
          
          echo "✅ Terraform state cleanup complete"
      
      - name: Verify state
        working-directory: infra
        run: |
          echo "Current Terraform state resources:"
          terraform state list | grep -i vabamorf || echo "No vabamorf resources in state"
