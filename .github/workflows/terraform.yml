name: Terraform Infrastructure

on:
  push:
    branches:
      - main
    paths:
      - "infra/**"
  pull_request:
    branches:
      - main
    paths:
      - "infra/**"
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy"
        required: true
        type: choice
        options:
          - dev
          - prod

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        environment: [dev, prod]

    defaults:
      run:
        working-directory: infra

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-west-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: 1.6.0

      - name: Terraform Format
        id: fmt
        run: terraform fmt -check
        continue-on-error: true

      - name: Terraform Init
        id: init
        run: |
          terraform init \
            -backend-config="bucket=askend-lab-terraform-state" \
            -backend-config="dynamodb_table=askend-lab-terraform-locks" \
            -backend-config="key=hak/${{ matrix.environment }}/terraform.tfstate"

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Plan (${{ matrix.environment }})
        id: plan
        env:
          TF_VAR_slack_webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: terraform plan -var-file="environments/${{ matrix.environment }}.tfvars" -no-color -input=false

      - name: Comment PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const output = `### Terraform Plan - ${{ matrix.environment }}

            #### Terraform Format and Style 🖌\`${{ steps.fmt.outcome }}\`
            #### Terraform Initialization ⚙️\`${{ steps.init.outcome }}\`
            #### Terraform Validation 🤖\`${{ steps.validate.outcome }}\`
            #### Terraform Plan 📖\`${{ steps.plan.outcome }}\`

            <details><summary>Show Plan</summary>

            \`\`\`terraform
            ${{ steps.plan.outputs.stdout }}
            \`\`\`

            </details>

            *Environment: \`${{ matrix.environment }}\`*
            *Pushed by: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

  terraform-apply:
    name: Terraform Apply
    needs: terraform-plan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    strategy:
      matrix:
        environment: [dev, prod]
      max-parallel: 1 # Apply sequentially to avoid conflicts

    defaults:
      run:
        working-directory: infra

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-west-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: 1.6.0

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=askend-lab-terraform-state" \
            -backend-config="dynamodb_table=askend-lab-terraform-locks" \
            -backend-config="key=hak/${{ matrix.environment }}/terraform.tfstate"

      - name: Check for stale state lock
        timeout-minutes: 2
        run: |
          # Query DynamoDB for any existing lock on this state
          LOCK_ID=$(aws dynamodb get-item \
            --table-name askend-lab-terraform-locks \
            --key '{"LockID": {"S": "askend-lab-terraform-state/hak/${{ matrix.environment }}/terraform.tfstate"}}' \
            --query 'Item.Info.S' --output text 2>/dev/null || echo "NONE")
          if [ "$LOCK_ID" != "NONE" ] && [ "$LOCK_ID" != "None" ] && [ -n "$LOCK_ID" ]; then
            echo "::error::⚠️ Terraform state is locked! Another apply may be in progress or a previous run crashed."
            echo "Lock info: $LOCK_ID"
            echo "To manually unlock: terraform force-unlock -force <LOCK_ID>"
            exit 1
          else
            echo "✅ No stale lock found"
          fi

      - name: Remove orphaned resources from state
        run: |
          # Audio resources were removed from code but still in state.
          # S3 buckets aren't empty so Terraform can't destroy them.
          for resource in $(terraform state list 2>/dev/null | grep -E '\.audio' || true); do
            echo "Removing $resource from state..."
            terraform state rm "$resource" 2>/dev/null || true
          done

          # API Gateway custom domain removed — SimpleStore/Auth now route through CloudFront.
          # Remove from state to prevent Terraform from trying to destroy (may already be gone).
          for resource in aws_api_gateway_domain_name.api aws_route53_record.api; do
            if terraform state list 2>/dev/null | grep -qF "$resource"; then
              echo "Removing $resource from state..."
              terraform state rm "$resource" 2>/dev/null || true
            fi
          done

          # Remove FAILED ACM certificates from state so Terraform recreates them.
          # ACM certs stuck in FAILED status (e.g. CAA_ERROR) can't recover — must be deleted and re-requested.
          for cert_resource in $(terraform state list 2>/dev/null | grep 'aws_acm_certificate\.' || true); do
            CERT_ARN=$(terraform state show "$cert_resource" 2>/dev/null | grep '^\s*arn\s' | awk -F'"' '{print $2}' || true)
            if [ -n "$CERT_ARN" ]; then
              REGION=$(echo "$CERT_ARN" | cut -d: -f4)
              STATUS=$(aws acm describe-certificate --certificate-arn "$CERT_ARN" --region "$REGION" --query 'Certificate.Status' --output text 2>/dev/null || true)
              if [ "$STATUS" == "FAILED" ]; then
                echo "⚠️ Removing FAILED certificate from state: $cert_resource ($CERT_ARN)"
                aws acm delete-certificate --certificate-arn "$CERT_ARN" --region "$REGION" 2>/dev/null || true
                terraform state rm "$cert_resource" 2>/dev/null || true
              fi
            fi
          done
          echo "✅ Orphaned resources removed from state"
        continue-on-error: true

      - name: Terraform Apply (${{ matrix.environment }})
        env:
          TF_VAR_slack_webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: terraform apply -var-file="environments/${{ matrix.environment }}.tfvars" -auto-approve -input=false

      - name: Deployment Summary
        run: |
          echo "✅ Terraform applied for ${{ matrix.environment }}"
          echo "🌐 Terraform applied for environment: ${{ matrix.environment }}"
