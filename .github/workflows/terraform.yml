name: Terraform Infrastructure

on:
  push:
    branches:
      - main
    paths:
      - 'infra/**'
  pull_request:
    branches:
      - main
    paths:
      - 'infra/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        type: choice
        options:
          - dev
          - prod

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [dev, prod]
    
    defaults:
      run:
        working-directory: infra
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::465168436856:role/GitHubActionsRole
          aws-region: eu-west-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0

      - name: Terraform Format
        id: fmt
        run: terraform fmt -check
        continue-on-error: true

      - name: Terraform Init
        id: init
        run: terraform init -backend-config="key=hak/${{ matrix.environment }}/terraform.tfstate"

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Plan (${{ matrix.environment }})
        id: plan
        run: terraform plan -var="env=${{ matrix.environment }}" -no-color -input=false
        continue-on-error: true

      - name: Comment PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const output = `### Terraform Plan - ${{ matrix.environment }} 
            
            #### Terraform Format and Style 🖌\`${{ steps.fmt.outcome }}\`
            #### Terraform Initialization ⚙️\`${{ steps.init.outcome }}\`
            #### Terraform Validation 🤖\`${{ steps.validate.outcome }}\`
            #### Terraform Plan 📖\`${{ steps.plan.outcome }}\`
            
            <details><summary>Show Plan</summary>
            
            \`\`\`terraform
            ${{ steps.plan.outputs.stdout }}
            \`\`\`
            
            </details>
            
            *Environment: \`${{ matrix.environment }}\`*
            *Pushed by: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

  terraform-apply:
    name: Terraform Apply
    needs: terraform-plan
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    strategy:
      matrix:
        environment: [dev, prod]
      max-parallel: 1  # Apply sequentially to avoid conflicts
    
    defaults:
      run:
        working-directory: infra
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::465168436856:role/GitHubActionsRole
          aws-region: eu-west-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0

      - name: Terraform Init
        run: terraform init -backend-config="key=hak/${{ matrix.environment }}/terraform.tfstate"

      - name: Import DynamoDB table (one-time)
        run: |
          terraform import -var="env=${{ matrix.environment }}" aws_dynamodb_table.single_table single-table-lambda-${{ matrix.environment }} 2>/dev/null || echo "Already imported or doesn't exist"
        continue-on-error: true

      - name: Import ECR vabamorf-api (one-time)
        run: |
          terraform import -var="env=${{ matrix.environment }}" aws_ecr_repository.vabamorf_api vabamorf-api 2>/dev/null || echo "Already imported or doesn't exist"
        continue-on-error: true

      - name: Terraform Apply (${{ matrix.environment }})
        run: terraform apply -var="env=${{ matrix.environment }}" -auto-approve -input=false
      
      - name: Deployment Summary
        run: |
          echo "✅ Terraform applied for ${{ matrix.environment }}"
          echo "🌐 Website: https://hak${{ matrix.environment == 'prod' && '' || format('-{0}', matrix.environment) }}.askend-lab.com"
