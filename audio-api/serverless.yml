service: audio-api

frameworkVersion: '3'

provider:
  name: aws
  runtime: nodejs18.x
  stage: ${opt:stage, 'dev'}
  region: ${opt:region, 'eu-west-1'}
  memorySize: 256
  timeout: 10
  
  environment:
    BUCKET_NAME: hak-audio-${self:provider.stage}
    QUEUE_URL: !Ref AudioGenerationQueue

  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - s3:HeadObject
            - s3:GetObject
          Resource: arn:aws:s3:::hak-audio-${self:provider.stage}/*
        - Effect: Allow
          Action:
            - sqs:SendMessage
          Resource: !GetAtt AudioGenerationQueue.Arn

functions:
  generate:
    handler: dist/index.handler
    events:
      - http:
          path: /generate
          method: post
          cors: true

  health:
    handler: dist/index.healthHandler
    events:
      - http:
          path: /health
          method: get
          cors: true

resources:
  Resources:
    AudioGenerationQueue:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: hak-audio-generation-${self:provider.stage}
        VisibilityTimeout: 300
        MessageRetentionPeriod: 86400
        ReceiveMessageWaitTimeSeconds: 20
        RedrivePolicy:
          deadLetterTargetArn: !GetAtt AudioGenerationDLQ.Arn
          maxReceiveCount: 3

    AudioGenerationDLQ:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: hak-audio-generation-dlq-${self:provider.stage}
        MessageRetentionPeriod: 1209600

  Outputs:
    ApiEndpoint:
      Description: Audio API Gateway endpoint URL
      Value: !Sub https://${ApiGatewayRestApi}.execute-api.${AWS::Region}.amazonaws.com/${self:provider.stage}
    QueueUrl:
      Description: SQS Queue URL for audio generation
      Value: !Ref AudioGenerationQueue
