# DevBox Configuration
# ALL parameters are REQUIRED - no hidden defaults

project:
  name: 'HAK'
  iterations_dir: iterations
  docs_dir: docs

methodology: none
git_workflow: github-flow  # github-flow | gitflow | trunk-based

# TDD enforcement
tdd:
  enabled: true
  doc: 'docs/TDD.md'

# Test modules with coverage requirements
test_modules:
  - name: hak
    path: .
    type: jest
    min_coverage_lines: 0
    min_coverage_branches: 0
    suites:
      - name: unit
        command: 'pnpm test:unit'
        results_file: 'tmp/jest-results-unit.json'
        coverage_path: 'tmp/coverage-unit'
        min_coverage_lines: 80
        min_coverage_branches: 70
  - name: simplestore
    path: packages/simplestore
    type: jest
    min_coverage_lines: 80
    min_coverage_branches: 70
  - name: audio-api
    path: packages/audio-api
    type: jest
    min_coverage_lines: 80
    min_coverage_branches: 70
  - name: merlin-worker
    path: packages/merlin-worker
    type: jest
    min_coverage_lines: 80
    min_coverage_branches: 70
  - name: vabamorf-api
    path: packages/vabamorf-api
    type: jest
    min_coverage_lines: 80
    min_coverage_branches: 70
  - name: specifications
    path: packages/specifications
    type: jest
    min_coverage_lines: 0
    min_coverage_branches: 0
  - name: shared
    path: packages/shared
    type: jest
    min_coverage_lines: 0
    min_coverage_branches: 0
  - name: frontend
    path: packages/frontend
    type: vitest
    min_coverage_lines: 80
    min_coverage_branches: 70

# Global coverage settings
coverage:
  min_total: 45
  fail_on_decrease: true

# Task Channel - Slack-based agent communication
task_channel:
  active: false
  mode: off  # off | warning | error
  channel_name: 'hak'

# Hooks configuration - ALL parameters required
hooks:
  markdown-size:
    active: true
    mode: warning  # off | warning | error
    max_lines: 200  # Temporarily raised - need to split large docs
    excludePaths:
      - 'docs/work/**'
      - 'docs/vision/**'
      - 'docs/hub/**'
      - 'docs/patterns/**'
      - 'docs/plans/**'
      - 'docs/templates/**'
      - '**/test/fixtures/**'
      - 'docs/DAILY_ITERATIONS.md'

  language-check:
    active: true
    mode: warning  # off | warning | error
    allowed_languages:
      - en
    excludePaths:
      - '**/drafts/**'
      - '**/test/fixtures/**'

  broken-links:
    mode: warning
    active: true
    check_external: false
    excludePaths:
      - '**/test/fixtures/**'

  no-console:
    mode: warning
    active: true
    allow_warn: true
    allow_error: true
    excludePaths:
      - 'audio-worker/**'
      - '**/audio-worker/**'
      - 'cli/**'
      - '**/dist/**'
      - '**/build/**'
      - '**/coverage/**'

  prettier-check:
    active: false
    mode: off  # off | warning | error

  test-required:
    mode: warning
    active: true
    patterns:
      - '*.test.js'
      - '*.spec.js'

  metrics-required:
    mode: warning
    active: true

  run-lint:
    mode: error
    active: true
    command: 'pnpm lint'

  run-typecheck:
    mode: error
    active: true
    command: 'pnpm exec tsc --noEmit'

  test-coverage:
    mode: off
    active: false  # Incompatible with Jest - coverage enforced by test runner

  run-tests:
    active: true
    mode: error  # Strict: test failures block commits
    command: 'node devbox test'

  plan-validation:
    mode: warning
    active: true
    strict: true

  # New hooks from boxer/devbox
  secret-detection:
    mode: error
    active: true
    excludePaths:
      - '**/test/fixtures/**'

  no-any:
    mode: error
    active: true

  import-order:
    mode: error
    active: true

  no-floating-promises:
    mode: error
    active: true

  security-audit:
    mode: error
    active: true
    auditLevel: moderate
    packageManager: pnpm

  dependency-check:
    mode: error
    active: true
    excludeDev: true
    ignoreBinPackage: false

  jscpd:
    mode: error
    active: true
    threshold: 5
    minLines: 5
    minTokens: 50
    excludePaths:
      - '**/node_modules/**'
      - '**/dist/**'
      - '**/coverage/**'
      - '**/test/fixtures/**'
      - '**/*.min.js'

  source-size:
    mode: error
    active: true
    max_lines: 400
    excludePaths:
      - '**/node_modules/**'
      - '**/dist/**'
      - '**/build/**'
      - '**/coverage/**'
      - '**/.git/**'
      - '**/test/fixtures/**'
      - '**/*.min.js'
      - '**/*.bundle.js'
      - '**/vendor/**'
      - '**/package-lock.json'
      - '**/pnpm-lock.yaml'
      - '**/yarn.lock'
      - '**/*.lock'

  # Stage-based execution - centralized configuration
stages:
  pre-commit:
    hooks:
      - markdown-size
      - source-size
      - language-check
      - broken-links
      - run-lint
      - run-typecheck
      - jscpd
      - dependency-check
      - security-audit
      - secret-detection
      - import-order
      - no-any
      - no-floating-promises
  
  pre-push:
    includes:
      - pre-commit
    hooks:
      - test-required
      - run-tests
  
  pr-check:
    includes:
      - pre-push
    hooks:
      - plan-validation
  
  ci-cd:
    includes:
      - pr-check
    hooks: []

# final