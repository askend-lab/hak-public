# DevBox Configuration
# ALL parameters are REQUIRED - no hidden defaults

project:
  name: 'HAK'
  iterations_dir: iterations
  docs_dir: docs

methodology: none
git_workflow: github-flow  # github-flow | gitflow | trunk-based

# TDD enforcement
tdd:
  enabled: true
  doc: 'docs/TDD.md'

# Test modules with coverage requirements
test_modules:
  - name: hak
    path: .
    type: jest
    min_coverage_lines: 16
    min_coverage_branches: 12
  - name: singletablelambda
    path: singletablelambda
    type: jest
    min_coverage_lines: 80
    min_coverage_branches: 80

# Global coverage settings
coverage:
  min_total: 75
  fail_on_decrease: true

# Task Channel - Slack-based agent communication
task_channel:
  active: false
  channel_name: 'hak'

# Hooks configuration - ALL parameters required
hooks:
  markdown-size:
    active: true
    max_lines: 200  # Temporarily raised - need to split large docs

  complexity:
    active: true
    max_complexity: 40  # Some legacy code is complex
    excludePaths:
      - '**/task-channel/**'  # Legacy scripts with high complexity
      - '**/dist/**'  # Build artifacts

  language-check:
    active: true
    allowed_languages:
      - en
    excludePaths:
      - '**/drafts/**'

  broken-links:
    active: true  # TODO: Fix 18 broken links first
    check_external: false

  no-console:
    active: true
    allow_warn: true
    allow_error: true

  prettier-check:
    active: false

  test-required:
    active: false
    patterns:
      - '*.test.js'
      - '*.spec.js'

  metrics-required:
    active: false  # test-runner now handles coverage enforcement

  run-tests:
    active: true
    command: 'npm test'

  plan-validation:
    active: false
    strict: true

# Stage-based execution - centralized configuration
stages:
  pre-commit:
    hooks:
      - markdown-size
      - complexity
      - language-check
      - no-console
  
  pre-push:
    includes:
      - pre-commit
    hooks:
      - run-tests
  
  pr-check:
    includes:
      - pre-push
    hooks:
      - plan-validation
  
  ci-cd:
    includes:
      - pr-check
    hooks: []

# final