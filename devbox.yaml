# DevBox Configuration - extends defaults
extends: './defaults.yaml'

project:
  name: 'HAK'

# Incremental testing - only runs affected tests (requires module-level opt-in)

# Test modules with coverage requirements
test_modules:
  - name: simplestore
    path: packages/simplestore
    type: jest
    min_coverage_lines: 80
    min_coverage_branches: 70
  - name: audio-api
    path: packages/audio-api
    type: jest
    min_coverage_lines: 80
    min_coverage_branches: 70
  - name: merlin-worker
    path: packages/merlin-worker
    type: jest
    min_coverage_lines: 80
    min_coverage_branches: 70
  - name: vabamorf-api
    path: packages/vabamorf-api
    type: jest
    min_coverage_lines: 80
    min_coverage_branches: 70
  - name: gherkin-parser
    path: packages/gherkin-parser
    type: jest
    min_coverage_lines: 80
    min_coverage_branches: 70
  - name: shared
    path: packages/shared
    type: jest
    min_coverage_lines: 0
    min_coverage_branches: 0
  - name: frontend
    path: packages/frontend
    type: vitest
    min_coverage_lines: 80
    min_coverage_branches: 70
    command: "pnpm test"
    command_full: "pnpm test:coverage"
  - name: cucumber
    path: packages/frontend
    type: cucumber
    min_coverage_lines: 0
    min_coverage_branches: 0

# Global coverage settings
coverage:
  min_total: 45

# Task Channel - Slack-based agent communication
task_channel:
  active: false
  channel_name: 'hak'

# Hooks configuration - ALL parameters required
hooks:
  markdown-size:
    active: true
    max_lines: 200  # Temporarily raised - need to split large docs
    excludePaths:
      - 'docs/work/**'
      - 'docs/vision/**'
      - 'docs/hub/**'
      - 'docs/patterns/**'
      - 'docs/plans/**'
      - 'docs/templates/**'
      - '**/test/fixtures/**'
      - 'docs/DAILY_ITERATIONS.md'
      - '.design/**'
      - 'CodeReview_*.md'
      - 'GHERKIN_PLAN.md'

  language-check:
    active: true
    allowed_languages:
      - en
    excludePaths:
      - '**/drafts/**'
      - '**/test/fixtures/**'
      - '.design/**'

  broken-links:
    active: true
    excludePaths:
      - '**/test/fixtures/**'
      - '.design/**'

  no-console:
    mode: error
    active: true
    allow_warn: true
    allow_error: true
    excludePaths:
      - 'audio-worker/**'
      - '**/audio-worker/**'
      - 'cli/**'
      - '**/dist/**'
      - '**/build/**'
      - '**/coverage/**'

  prettier-check:
    active: true

  test-required:
    active: true
    tdd: true  # Enable strict TDD enforcement for feat/fix commits
    patterns:
      - '*.test.js'
      - '*.spec.js'

  metrics-required:
    active: true

  run-lint:
    active: true
    command: 'pnpm lint'

  run-typecheck:
    active: true
    command: 'pnpm -r exec tsc --noEmit'

  test-coverage:
    mode: error
    active: true

  run-tests:
    active: true
    command: 'node devbox test'

  run-build:
    active: true
    mode: error
    command: 'pnpm --filter @hak/frontend build'

  plan-validation:
    active: true

  jscpd:
    active: true
    excludePaths:
      - '**/node_modules/**'
      - '**/dist/**'
      - '**/coverage/**'
      - '**/test/fixtures/**'
      - '**/*.min.js'

  # Stage-based execution - centralized configuration
stages:
  pre-commit:
    hooks:
      - markdown-size
      - language-check
      - broken-links
      - run-lint
      - run-typecheck
      - run-build
      - jscpd
  
  commit-msg:
    hooks:
      - test-required
  
  pre-push:
    includes:
      - pre-commit
    hooks:
      - run-tests
  
  pr-check:
    includes:
      - pre-push
    hooks:
      - plan-validation
  
  ci-cd:
    includes:
      - pr-check
    hooks: []

# final