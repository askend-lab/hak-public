# DevBox Configuration
# ALL parameters are REQUIRED - no hidden defaults

project:
  name: 'HAK'
  iterations_dir: iterations
  docs_dir: docs

methodology: none
git_workflow: github-flow  # github-flow | gitflow | trunk-based

# TDD enforcement
tdd:
  enabled: true
  doc: 'docs/TDD.md'

# Test modules with coverage requirements
test_modules:
  - name: hak
    path: .
    type: jest
    min_coverage_lines: 0
    min_coverage_branches: 0
    suites:
      - name: unit
        command: 'pnpm test:unit'
        results_file: 'jest-results-unit.json'
        min_coverage_lines: 45
        min_coverage_branches: 48
      - name: features
        command: 'pnpm test:features'
        results_file: 'jest-results-features.json'
        min_coverage_lines: 45
        min_coverage_branches: 48
  - name: singletablelambda
    path: singletablelambda
    type: jest
    min_coverage_lines: 80
    min_coverage_branches: 80

# Global coverage settings
coverage:
  min_total: 45
  fail_on_decrease: false

# Task Channel - Slack-based agent communication
task_channel:
  active: false
  mode: off  # off | warning | error
  channel_name: 'hak'

# Hooks configuration - ALL parameters required
hooks:
  markdown-size:
    active: true
    mode: warning  # off | warning | error
    max_lines: 200  # Temporarily raised - need to split large docs

  language-check:
    active: true
    mode: warning  # off | warning | error
    allowed_languages:
      - en
    excludePaths:
      - '**/drafts/**'

  broken-links:
    active: true
    mode: warning  # off | warning | error
    check_external: false

  no-console:
    active: false
    mode: off  # Temporarily disabled - audio-worker needs console for CloudWatch
    allow_warn: true
    allow_error: true
    excludePaths:
      - 'audio-worker/**'
      - '**/audio-worker/**'

  prettier-check:
    active: false
    mode: off  # off | warning | error

  test-required:
    active: false
    mode: off  # off | warning | error
    patterns:
      - '*.test.js'
      - '*.spec.js'

  metrics-required:
    active: false
    mode: off  # test-runner now handles coverage enforcement

  run-tests:
    active: true
    mode: warning  # off | warning | error
    command: 'node devbox test'

  plan-validation:
    active: false
    mode: off  # off | warning | error
    strict: true

# Stage-based execution - centralized configuration
stages:
  pre-commit:
    hooks:
      - markdown-size
      - language-check
  
  pre-push:
    includes:
      - pre-commit
    hooks:
      - run-tests
  
  pr-check:
    includes:
      - pre-push
    hooks:
      - plan-validation
  
  ci-cd:
    includes:
      - pr-check
    hooks: []

# final