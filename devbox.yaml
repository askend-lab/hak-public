# DevBox Configuration - extends defaults
extends: "./defaults.yaml"

project:
  name: "HAK"

# Global excludes (merged with defaults)
global_excludes:
  - '**/.venv/**'

# Test modules with coverage requirements
test_modules:
  - name: simplestore
    path: packages/simplestore
    type: jest
  - name: audio-api
    path: packages/audio-api
    type: jest
  - name: merlin-worker
    path: packages/merlin-worker
    type: pytest
    command: ".venv/bin/pytest tests/ -v --json-report --json-report-file=pytest-results.json"
    command_full: ".venv/bin/pytest tests/ -v --json-report --json-report-file=pytest-results.json --cov=worker --cov-report=json:coverage/coverage.json"
    results_file: "pytest-results.json"
  - name: merlin-api
    path: packages/merlin-api
    type: jest
  - name: vabamorf-api
    path: packages/vabamorf-api
    type: jest
  - name: gherkin-parser
    path: packages/gherkin-parser
    type: jest
  - name: tara-auth
    path: packages/tara-auth
    type: jest
    min_coverage_branches: 90
  - name: shared
    path: packages/shared
    type: jest
  - name: frontend
    path: packages/frontend
    type: vitest
    min_coverage_branches: 85
    command: "pnpm test"
    command_full: "pnpm test:coverage"
    results_file: "test-results.json"
  - name: cucumber
    path: packages/frontend
    type: cucumber
    min_coverage_lines: 0
    min_coverage_branches: 0

# Global coverage settings
coverage:
  min_total: 95

# Task Channel - Slack-based agent communication
task_channel:
  channel_name: "hak"

# Hooks configuration - ALL parameters required
hooks:
  markdown-size:
    max_lines: 200
    excludePaths:
      - "docs/work/**"
      - "docs/vision/**"
      - "packages/frontend/src/styles/eki/**"
      - "docs/hub/**"
      - "docs/patterns/**"
      - "docs/plans/**"
      - "docs/templates/**"
      - "**/test/fixtures/**"
      - "docs/DAILY_ITERATIONS.md"
      - "docs/open-source/MASTER_PLAN.md"
      - "CodeReview_*.md"
      - "GHERKIN_PLAN.md"
      - "docs/CUCUMBER_STEPS_CHECKLIST.md"
      - "**/AUDIT_FINDINGS.md"
      - "**/WCAG_AUDIT_REPORT.md"
      - "**/DESIGN_SYSTEM_COMPLIANCE_REPORT.md"
      - "**/ACCESSIBILITY_REMEDIATION_BACKLOG.md"
      - "docs/internal/design-system/07-Quality-Standards.md"
      - "audits/**"

  language-check:
    excludePaths:
      - "**/drafts/**"
      - "**/test/fixtures/**"
      - "**/node_modules/**"
      - "docs/**"
      - ".project/**"
      - "**/*.md"

  broken-links:
    excludePaths:
      - "**/test/fixtures/**"

  no-console:
    mode: error
    allow_warn: true
    allow_error: true
    excludePaths:
      - "audio-worker/**"
      - "**/audio-worker/**"
      - "cli/**"
      - "**/dist/**"
      - "**/build/**"
      - "**/coverage/**"
      - "**/logger.ts"
      - "**/local-server.ts"
      - "**/a11y-dev.ts"
      - "**/*.test.ts"
      - "**/*.test.tsx"
      - "**/*.spec.ts"
      - "**/*.spec.tsx"
      - "**/test/**"
      - "**/e2e/**"
      - "**/vendor/**"
      - "**/__mocks__/**"
      - "**/stories/**"
      - "**/scripts/**"

  prettier-check:
    mode: off

  test-required:
    tdd: true # Enable strict TDD enforcement for feat/fix commits
    excludePaths:
      - "jest.setup.ts"
      - "*.config.ts"
      - "*.config.js"
      - "**/steps-ts/**"
      - "*.steps.ts"
      - "**/specs/**"
      - "SpecsPage.tsx"
      - "**/services/specs/**"
      - "App.tsx"
      - "AppHeader.tsx"
      - "**/merlin/*.py" # Legacy TTS Python code
      - "main.tsx" # Entry point configuration
      - "DebugPage.tsx" # Debug utility
      - "**/debug/**" # Debug endpoints
      - "handler.ts" # Lambda handler (infrastructure)
      - "routes.ts" # Lambda routes (infrastructure)

  metrics-required: {}

  run-lint:
    command: "pnpm lint"
    excludePaths:
      - "**/e2e/accessibility.spec.ts"
      - "**/scripts/a11y-audit.mjs"
      - "**/scripts/validate-design.js"

  run-typecheck:
    command: "pnpm -r exec tsc --noEmit"

  test-coverage:
    mode: error

  run-tests:
    command: "node devbox test"

  run-build:
    mode: error
    command: "pnpm --filter @hak/frontend build"

  plan-validation: {}

  jscpd:
    excludePaths:
      - "**/node_modules/**"
      - "**/dist/**"
      - "**/coverage/**"
      - "**/test/fixtures/**"
      - "**/*.min.js"

  source-size:
    excludePaths:
      # Build artifacts and reports
      - "**/eslint.base.config.mjs"
      - "**/*.generated.ts"
      - "**/.stryker-tmp/**"
      - "**/.old-frontend/**"
      - "**/.esbuild/**"
      - "**/.serverless/**"
      - "**/audit-results.json"
      - "**/jscpd-report.json"
      - "**/cucumber-results.json"
      - "**/coverage-summary.json"
      - "**/.nyc_output/**"
      - "**/cucumber-report.json"
      - "**/merlin/**/*.py"
      - "**/merlin-worker/tools/**/*"
      - "**/scripts/validate-design.js"
      - "**/styles/**/*.scss"
      - "**/styles/*.scss"
      # Test files still over 400L (TODO: split these)
      - "**/useSynthesis.test.ts"
      - "**/SentenceSynthesisItem.test.tsx"
      - "**/useSynthesisOrchestrator.test.ts"
      - "**/SharedTaskPage.test.tsx"
      - "**/App.test.tsx"
      - "**/useSynthesis.branches.test.ts"
      - "**/useTaskHandlers.test.ts"
      - "**/boundary.test.ts"
      - "**/PronunciationVariants.test.tsx"

  security-audit:
    packageManager: pnpm

  secret-detection:
    required: true

  dependency-check: {}

  import-order: {}

  no-any: {}

  no-floating-promises: {}

  license-check:
    mode: error

  bundle-size:
    mode: off

  docker-lint:
    excludePaths:
      - "**/node_modules/**"

  iac-security:
    excludePaths:
      - "**/node_modules/**"

  no-hardcoded-env:
    mode: off
    domains:
      - "askend-lab.com"
    checkAwsAccountId: true
    excludePaths:
      - ".github/workflows/**"
      - "**/node_modules/**"
      - "**/*.test.*"
      - "**/*.spec.*"
      - "**/test/**"
      - "**/__tests__/**"
      - "**/coverage/**"
      - "**/dist/**"
      - "**/devbox.yaml"
      - "**/defaults.yaml"

  dead-code:
    excludePaths:
      - "**/node_modules/**"
      - "**/*.test.ts"
      - "**/*.spec.ts"

# final
