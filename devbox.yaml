# DevBox Configuration
# ALL parameters are REQUIRED - no hidden defaults

project:
  name: 'HAK'
  iterations_dir: iterations
  docs_dir: docs

methodology: none
git_workflow: github-flow  # github-flow | gitflow | trunk-based

# TDD enforcement
tdd:
  enabled: true
  doc: 'docs/TDD.md'

# Test modules with coverage requirements
test_modules:
  - name: hak
    path: .
    type: jest
    min_coverage_lines: 0
    min_coverage_branches: 0
    suites:
      - name: unit
        command: 'pnpm test:unit'
        results_file: 'jest-results-unit.json'
        coverage_path: 'coverage-unit'
        min_coverage_lines: 80
        min_coverage_branches: 70
      - name: features
        command: 'pnpm test:features'
        results_file: 'jest-results-features.json'
        coverage_path: 'coverage-features'
        min_coverage_lines: 80
        min_coverage_branches: 70
  - name: singletablelambda
    path: packages/singletablelambda
    type: jest
    min_coverage_lines: 80
    min_coverage_branches: 70
  - name: audio-api
    path: packages/audio-api
    type: jest
    min_coverage_lines: 80
    min_coverage_branches: 70
  - name: audio-worker
    path: packages/audio-worker
    type: jest
    min_coverage_lines: 80
    min_coverage_branches: 70
  - name: vabamorf-api
    path: packages/vabamorf-api
    type: jest
    min_coverage_lines: 80
    min_coverage_branches: 70

# Global coverage settings
coverage:
  min_total: 45
  fail_on_decrease: false

# Task Channel - Slack-based agent communication
task_channel:
  active: false
  mode: off  # off | warning | error
  channel_name: 'hak'

# Hooks configuration - ALL parameters required
hooks:
  markdown-size:
    active: true
    mode: warning  # off | warning | error
    max_lines: 200  # Temporarily raised - need to split large docs
    excludePaths:
      - 'docs/work/**'
      - 'docs/vision/**'
      - 'docs/hub/**'
      - 'docs/patterns/**'
      - 'docs/plans/**'
      - 'docs/templates/**'
      - '**/test/fixtures/**'
      - 'docs/DAILY_ITERATIONS.md'

  language-check:
    active: true
    mode: warning  # off | warning | error
    allowed_languages:
      - en
    excludePaths:
      - '**/drafts/**'
      - '**/test/fixtures/**'

  broken-links:
    mode: warning
    active: true
    check_external: false
    excludePaths:
      - '**/test/fixtures/**'

  no-console:
    mode: warning
    active: true
    allow_warn: true
    allow_error: true
    excludePaths:
      - 'audio-worker/**'
      - '**/audio-worker/**'
      - 'cli/**'
      - '**/dist/**'
      - '**/build/**'
      - '**/coverage/**'

  prettier-check:
    active: false
    mode: off  # off | warning | error

  test-required:
    mode: warning
    active: true
    patterns:
      - '*.test.js'
      - '*.spec.js'

  metrics-required:
    mode: warning
    active: true

  run-lint:
    mode: warning
    active: true
    command: 'pnpm exec eslint .'

  run-typecheck:
    mode: error
    active: true
    command: 'pnpm exec tsc --noEmit'

  test-coverage:
    mode: off
    active: false

  run-tests:
    active: true
    mode: warning  # off | warning | error
    command: 'node devbox test'

  plan-validation:
    mode: warning
    active: true
    strict: true

  # Stage-based execution - centralized configuration
stages:
  pre-commit:
    hooks:
      - markdown-size
      - language-check
      - broken-links
      - run-lint
      - run-typecheck
      - test-coverage
      - prettier-check
  
  pre-push:
    includes:
      - pre-commit
    hooks:
      - test-required
      - run-tests
  
  pr-check:
    includes:
      - pre-push
    hooks:
      - plan-validation
  
  ci-cd:
    includes:
      - pr-check
    hooks: []

# final