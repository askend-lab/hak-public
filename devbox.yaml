# DevBox Configuration - extends defaults
extends: './defaults.yaml'

project:
  name: 'HAK'

# Incremental testing - only runs affected tests (requires module-level opt-in)

# Test modules with coverage requirements
test_modules:
  - name: simplestore
    path: packages/simplestore
    type: jest
  - name: audio-api
    path: packages/audio-api
    type: jest
  - name: merlin-worker
    path: packages/merlin-worker
    type: jest
  - name: vabamorf-api
    path: packages/vabamorf-api
    type: jest
  - name: gherkin-parser
    path: packages/gherkin-parser
    type: jest
  - name: shared
    path: packages/shared
    type: jest
  - name: frontend
    path: packages/frontend
    type: vitest
    command: "pnpm test"
    command_full: "pnpm test:coverage"
  - name: cucumber
    path: packages/frontend
    type: cucumber
    min_coverage_lines: 0
    min_coverage_branches: 0
    allow_failures: true

# Global coverage settings
coverage:
  min_total: 45

# Task Channel - Slack-based agent communication
task_channel:
  channel_name: 'hak'

# Hooks configuration - ALL parameters required
hooks:
  markdown-size:
    max_lines: 200  # Temporarily raised - need to split large docs
    excludePaths:
      - 'docs/work/**'
      - 'docs/vision/**'
      - 'packages/frontend/src/styles/eki/**'
      - 'docs/hub/**'
      - 'docs/patterns/**'
      - 'docs/plans/**'
      - 'docs/templates/**'
      - '**/test/fixtures/**'
      - 'docs/DAILY_ITERATIONS.md'
      - '.design/**'
      - 'CodeReview_*.md'
      - 'GHERKIN_PLAN.md'
      - 'docs/CUCUMBER_STEPS_CHECKLIST.md'
      - '**/AUDIT_FINDINGS.md'
      - '**/WCAG_AUDIT_REPORT.md'
      - '**/DESIGN_SYSTEM_COMPLIANCE_REPORT.md'
      - '**/ACCESSIBILITY_REMEDIATION_BACKLOG.md'
      - 'docs/02-DESIGN-SYSTEM/07-Quality-Standards.md'

  language-check:
    excludePaths:
      - '**/drafts/**'
      - '**/test/fixtures/**'
      - '.design/**'

  broken-links:
    excludePaths:
      - '**/test/fixtures/**'
      - '.design/**'

  no-console:
    mode: error
    allow_warn: true
    allow_error: true
    excludePaths:
      - 'audio-worker/**'
      - '**/audio-worker/**'
      - 'cli/**'
      - '**/dist/**'
      - '**/build/**'
      - '**/coverage/**'

  prettier-check: {}

  test-required:
    tdd: true  # Enable strict TDD enforcement for feat/fix commits
    excludePaths:
      - 'jest.setup.ts'
      - '*.config.ts'
      - '*.config.js'
      - '**/steps-ts/**'
      - '*.steps.ts'
      - '**/specs/**'
      - 'SpecsPage.tsx'
      - '**/services/specs/**'
      - 'App.tsx'
      - 'AppHeader.tsx'
      - '**/merlin/*.py'  # Legacy TTS Python code
      - 'main.tsx'  # Entry point configuration
      - 'DebugPage.tsx'  # Debug utility
      - '**/debug/**'  # Debug endpoints
      - 'handler.ts'  # Lambda handler (infrastructure)
      - 'routes.ts'  # Lambda routes (infrastructure)

  metrics-required: {}

  run-lint:
    mode: warning
    blocking: false  # Non-blocking - lint warnings cleanup in progress
    command: 'pnpm lint'
    excludePaths:
      - '**/e2e/accessibility.spec.ts'
      - '**/scripts/a11y-audit.mjs'
      - '**/scripts/validate-design.js'

  run-typecheck:
    command: 'pnpm -r exec tsc --noEmit'

  test-coverage: {}

  run-tests:
    command: 'node devbox test'

  run-build:
    command: 'pnpm --filter @hak/frontend build'

  plan-validation: {}

  jscpd:
    excludePaths:
      - '**/node_modules/**'
      - '**/dist/**'
      - '**/coverage/**'
      - '**/test/fixtures/**'
      - '**/*.min.js'

  source-size:
    excludePaths:
      - '**/.old-frontend/**'
      - '**/.esbuild/**'
      - '**/.serverless/**'
      - '**/steps-ts/**'
      - '**/PronunciationVariants.tsx'
      - '**/TaskDetailView.tsx'
      - '**/audit-results.json'
      - '**/jscpd-report.json'
      - '**/cucumber-results.json'
      - '**/scripts/validate-design.js'
      - '**/scripts/a11y-audit.mjs'
      - '**/useSynthesis.test.ts'
      - '**/SentenceSynthesisItem.test.tsx'
      - '**/styles/**/*.scss'
      - '**/*.full.test.tsx'
      - '**/*.full.test.ts'
      - '**/cucumber-report.json'
      - '**/merlin/**/*.py'
      - '**/test.scss'

# final
