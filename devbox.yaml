# DevBox Configuration - extends defaults
extends: './defaults.yaml'

project:
  name: 'HAK'

# Incremental testing - only runs affected tests (requires module-level opt-in)

# Test modules with coverage requirements
test_modules:
  - name: simplestore
    path: packages/simplestore
    type: jest
  - name: audio-api
    path: packages/audio-api
    type: jest
  - name: merlin-worker
    path: packages/merlin-worker
    type: jest
  - name: vabamorf-api
    path: packages/vabamorf-api
    type: jest
  - name: gherkin-parser
    path: packages/gherkin-parser
    type: jest
  - name: shared
    path: packages/shared
    type: jest
  - name: frontend
    path: packages/frontend
    type: vitest
    min_coverage_lines: 82
    min_coverage_branches: 72
    command: "pnpm test"
    command_full: "pnpm test:coverage"
  - name: cucumber
    path: packages/frontend
    type: cucumber
    min_coverage_lines: 0
    min_coverage_branches: 0
    allow_failures: true

# Global coverage settings
coverage:
  min_total: 45

# Task Channel - Slack-based agent communication
task_channel:
  channel_name: 'hak'

# Hooks configuration - ALL parameters required
hooks:
  markdown-size:
    mode: off

  language-check:
    excludePaths:
      - '**/drafts/**'
      - '**/test/fixtures/**'
      - '.design/**'
      - '.project/plans/**'
      - 'docs/01-SPECIFICATIONS/04-TEST-DATA/**'

  broken-links:
    excludePaths:
      - '**/test/fixtures/**'
      - '.design/**'

  no-console:
    mode: error
    allow_warn: true
    allow_error: true
    excludePaths:
      - 'audio-worker/**'
      - '**/audio-worker/**'
      - 'cli/**'
      - '**/dist/**'
      - '**/build/**'
      - '**/coverage/**'

  prettier-check: {}

  test-required:
    tdd: true  # Enable strict TDD enforcement for feat/fix commits
    excludePaths:
      - 'jest.setup.ts'
      - '*.config.ts'
      - '*.config.js'
      - '**/steps-ts/**'
      - '*.steps.ts'
      - '**/specs/**'
      - 'SpecsPage.tsx'
      - '**/services/specs/**'
      - 'App.tsx'
      - 'AppHeader.tsx'
      - '**/merlin/*.py'  # Legacy TTS Python code
      - 'main.tsx'  # Entry point configuration
      - 'DebugPage.tsx'  # Debug utility
      - '**/debug/**'  # Debug endpoints
      - 'handler.ts'  # Lambda handler (infrastructure)
      - 'routes.ts'  # Lambda routes (infrastructure)

  metrics-required: {}

  run-lint:
    mode: error
    blocking: true
    command: 'pnpm lint'

  run-typecheck:
    command: 'pnpm -r exec tsc --noEmit'

  test-coverage: {}

  run-tests:
    command: 'node devbox test'

  run-build:
    command: 'pnpm --filter @hak/frontend build'

  plan-validation: {}

  jscpd:
    excludePaths:
      - '**/node_modules/**'
      - '**/dist/**'
      - '**/coverage/**'
      - '**/test/fixtures/**'
      - '**/*.min.js'

  source-size:
    excludePaths:
      - '**/.old-frontend/**'
      - '**/.esbuild/**'
      - '**/.serverless/**'
      - '**/cucumber-results.json'
      - '**/jscpd-report.json'
      - '**/report/**'
      - '**/reports/**'
      - '**/coverage/**'
      - '**/jest-results.json'
      - '**/*.generated.ts'
      - '**/mock-tasks.json'
      - '**/styles/**'
      - '**/eki/**'
      - '**/merlin/**/*.py'
      - '**/cucumber-report.json'
      - '**/*.full.test.tsx'
      - '**/*.full.test.ts'
      - '**/merlin-worker/tools/**'
      - '**/SentenceSynthesisItem.test.tsx'

  security-audit:
    mode: error

  secret-detection:
    mode: error

  dependency-check:
    mode: error

  import-order:
    mode: error

  no-any:
    mode: error

  no-floating-promises:
    mode: error
