# DevBox Configuration - extends defaults
extends: './defaults.yaml'

project:
  name: 'HAK'

# Incremental testing - only runs affected tests (requires module-level opt-in)

# Test modules with coverage requirements
test_modules:
  - name: simplestore
    path: packages/simplestore
    type: jest
    min_coverage_lines: 80
    min_coverage_branches: 70
  - name: audio-api
    path: packages/audio-api
    type: jest
    min_coverage_lines: 80
    min_coverage_branches: 70
  - name: merlin-worker
    path: packages/merlin-worker
    type: jest
    min_coverage_lines: 80
    min_coverage_branches: 70
  - name: vabamorf-api
    path: packages/vabamorf-api
    type: jest
    min_coverage_lines: 80
    min_coverage_branches: 70
  - name: gherkin-parser
    path: packages/gherkin-parser
    type: jest
    min_coverage_lines: 80
    min_coverage_branches: 70
  - name: shared
    path: packages/shared
    type: jest
    min_coverage_lines: 80
    min_coverage_branches: 70
  - name: frontend
    path: packages/frontend
    type: vitest
    min_coverage_lines: 80
    min_coverage_branches: 70
    command: "pnpm test"
    command_full: "pnpm test:coverage"
  - name: cucumber
    path: packages/frontend
    type: cucumber
    min_coverage_lines: 0
    min_coverage_branches: 0
    allow_failures: true

# Global coverage settings
coverage:
  min_total: 45

# Task Channel - Slack-based agent communication
task_channel:
  active: false
  channel_name: 'hak'

# Hooks configuration - ALL parameters required
hooks:
  markdown-size:
    active: true
    max_lines: 200  # Temporarily raised - need to split large docs
    excludePaths:
      - 'docs/work/**'
      - 'docs/vision/**'
      - 'packages/frontend/src/styles/eki/**'
      - 'docs/hub/**'
      - 'docs/patterns/**'
      - 'docs/plans/**'
      - 'docs/templates/**'
      - '**/test/fixtures/**'
      - 'docs/DAILY_ITERATIONS.md'
      - '.design/**'
      - 'CodeReview_*.md'
      - 'GHERKIN_PLAN.md'

  language-check:
    active: true
    allowed_languages:
      - en
    excludePaths:
      - '**/drafts/**'
      - '**/test/fixtures/**'
      - '.design/**'
      - '.project/plans/**'
      - 'docs/01-SPECIFICATIONS/04-TEST-DATA/**'

  broken-links:
    active: true
    excludePaths:
      - '**/test/fixtures/**'
      - '.design/**'

  no-console:
    mode: error
    active: true
    allow_warn: true
    allow_error: true
    excludePaths:
      - 'audio-worker/**'
      - '**/audio-worker/**'
      - 'cli/**'
      - '**/dist/**'
      - '**/build/**'
      - '**/coverage/**'

  prettier-check:
    active: true

  test-required:
    active: true
    tdd: true  # Enable strict TDD enforcement for feat/fix commits
    patterns:
      - '*.test.js'
      - '*.spec.js'
    excludePaths:
      - 'jest.setup.ts'
      - '*.config.ts'
      - '*.config.js'
      - '**/steps-ts/**'
      - '*.steps.ts'
      - '**/specs/**'
      - 'SpecsPage.tsx'
      - '**/services/specs/**'
      - 'App.tsx'
      - 'AppHeader.tsx'
      - '**/merlin/*.py'  # Legacy TTS Python code
      - 'main.tsx'  # Entry point configuration
      - 'DebugPage.tsx'  # Debug utility
      - '**/debug/**'  # Debug endpoints
      - 'handler.ts'  # Lambda handler (infrastructure)
      - 'routes.ts'  # Lambda routes (infrastructure)

  metrics-required:
    active: true

  run-lint:
    active: true
    blocking: false  # Non-blocking - lint warnings cleanup in progress
    command: 'pnpm lint'

  run-typecheck:
    active: true
    command: 'pnpm -r exec tsc --noEmit'

  test-coverage:
    mode: error
    active: true

  run-tests:
    active: true
    command: 'node devbox test'

  run-build:
    active: true
    mode: error
    command: 'pnpm --filter @hak/frontend build'

  plan-validation:
    active: true

  jscpd:
    active: true
    excludePaths:
      - '**/node_modules/**'
      - '**/dist/**'
      - '**/coverage/**'
      - '**/test/fixtures/**'
      - '**/*.min.js'

  source-size:
    active: true
    excludePaths:
      - '**/.old-frontend/**'
      - '**/.esbuild/**'
      - '**/.serverless/**'
      - '**/cucumber-results.json'
      - '**/jscpd-report.json'
      - '**/report/**'
      - '**/reports/**'
      - '**/coverage/**'
      - '**/jest-results.json'
      - '**/*.generated.ts'
      - '**/mock-tasks.json'
      - '**/styles/**'
      - '**/eki/**'
      - '**/merlin/**/*.py'
      - '**/cucumber-report.json'
      - '**/*.full.test.tsx'
      - '**/*.full.test.ts'
      - '**/merlin-worker/tools/**'
      - '**/SentenceSynthesisItem.test.tsx'

# final