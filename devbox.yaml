# DevBox Configuration — extends Node.js layer
extends: '@askend-lab/devbox/layers/node.yaml'

project:
  name: "HAK"

test_mode: full

# Test modules — only non-auto-discoverable overrides needed
test_modules:
  - name: store
    path: packages/store
    type: vitest
  - name: tts-worker
    path: packages/tts-worker
    type: pytest
    command: ".venv/bin/pytest tests/ -v --json-report --json-report-file=pytest-results.json"
    command_full: ".venv/bin/pytest tests/ -v --json-report --json-report-file=pytest-results.json --cov=worker --cov-report=json:coverage/coverage.json"
    results_file: "pytest-results.json"
  - name: tts-api
    path: packages/tts-api
    type: jest
  - name: morphology-api
    path: packages/morphology-api
    type: jest
  - name: gherkin-parser
    path: packages/gherkin-parser
    type: jest
  - name: auth
    path: packages/auth
    type: jest
    min_coverage_branches: 90
  - name: shared
    path: packages/shared
    type: vitest
  - name: frontend
    path: packages/frontend
    type: vitest
    command: "pnpm test"
    command_full: "pnpm test:coverage"

# Per-file coverage — ratcheted (target: 95/85)
per_file_coverage:
  min_lines: 75
  min_branches: 50
  allowlist:
    - LoginModal.tsx
    - SynthesisView.tsx
    - useDragAndDrop.ts
    - TasksRoute.tsx

coverage:
  min_total: 90

task_channel:
  channel_name: "hak"

# Hooks — only project-specific overrides (generic excludes are in defaults)
hooks:
  markdown-size:
    max_lines: 200
    excludePaths:
      - "docs/**"
      - "audits/**"
      - "internal/**"
      - "CodeReview_*.md"
      - "GHERKIN_PLAN.md"
      - "packages/frontend/src/styles/eki/**"

  language-check:
    excludePaths:
      - "**/drafts/**"
      - "docs/**"
      - ".project/**"
      - "**/*.md"

  no-console:
    excludePaths:
      - "audio-worker/**"
      - "**/audio-worker/**"
      - "cli/**"
      - "**/logger.ts"
      - "**/local-server.ts"
      - "**/a11y-dev.ts"

  prettier-check:
    mode: off

  test-required:
    tdd: true
    excludePaths:
      - "**/steps-ts/**"
      - "*.steps.ts"
      - "**/specs/**"
      - "SpecsPage.tsx"
      - "**/services/specs/**"
      - "AppHeader.tsx"
      - "**/merlin/*.py"
      - "DebugPage.tsx"
      - "**/debug/**"
      - "handler.ts"
      - "routes.ts"

  run-lint:
    excludePaths:
      - "**/e2e/accessibility.spec.ts"

  run-build:
    mode: error
    command: "pnpm --filter @hak/frontend build"

  jscpd:
    mode: "off"

  source-size:
    excludePaths:
      - "**/eslint.base.config.mjs"
      - "**/.old-frontend/**"
      - "**/tts-worker/**/*.py"
      - "**/tts-worker/tools/**/*"
      - "**/tts-worker/merlin/**/*"
      - "**/styles/**/*.scss"
      - "**/styles/*.scss"
      - "**/useSynthesis.test.ts"
      - "**/SentenceSynthesisItem.test.tsx"
      - "**/useSynthesisOrchestrator.test.ts"
      - "**/SharedTaskPage.test.tsx"
      - "**/App.test.tsx"
      - "**/useSynthesis.branches.test.ts"
      - "**/useTaskHandlers.test.ts"
      - "**/boundary.test.ts"
      - "**/PronunciationVariants.test.tsx"

  security-audit:
    mode: warning
    auditLevel: critical

  license-check:
    mode: error

  bundle-size:
    mode: off

  no-hardcoded-env:
    mode: off

  circular-deps:
    paths:
      - "packages/frontend/src"
      - "packages/store/src"
      - "packages/auth/src"
      - "packages/shared/src"
      - "packages/api-client/src"
      - "packages/tts-api/src"
      - "packages/morphology-api/src"
      - "packages/gherkin-parser/src"
