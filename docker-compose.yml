# Local development environment
# Usage: docker compose up -d
# Frontend runs natively via `pnpm start` (not in Docker)

services:
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: hak-dynamodb
    ports:
      - "8000:8000"
    command: "-jar DynamoDBLocal.jar -sharedDb -inMemory"
    volumes:
      - dynamodb-data:/home/dynamodblocal/data

  vabamorf-api:
    build:
      context: packages/vabamorf-api
      dockerfile: Dockerfile.local
    container_name: hak-vabamorf
    ports:
      - "8080:8080"
    environment:
      - VMETAJSON_PATH=/app/vmetajson
      - DICT_PATH=/app

volumes:
  dynamodb-data:
