service: tara-auth

frameworkVersion: '3'

plugins:
  - serverless-esbuild
  - serverless-offline
  - serverless-domain-manager

custom:
  esbuild:
    bundle: true
    minify: false
    sourcemap: true
    platform: 'node'
    target: 'node20'
    packager: 'pnpm'
    
  domainName:
    dev: ${ssm:/hak/dev/api-domain}
    prod: ${ssm:/hak/prod/api-domain}
  
  customDomain:
    domainName: ${self:custom.domainName.${self:provider.stage}}
    basePath: auth
    stage: ${self:provider.stage}
    certificateName: ${ssm:/hak/shared/certificate-name}
    createRoute53Record: true
    endpointType: regional
    securityPolicy: tls_1_2
    apiType: rest

  taraConfig:
    dev:
      issuer: https://tara-test.ria.ee
    prod:
      issuer: https://tara.ria.ee

provider:
  name: aws
  runtime: nodejs22.x
  stage: ${opt:stage, 'dev'}
  region: ${opt:region, 'eu-west-1'}
  apiGateway:
    throttle:
      rateLimit: 10
      burstLimit: 20
  
  environment:
    TARA_ISSUER: ${self:custom.taraConfig.${self:provider.stage}.issuer}
    TARA_SECRETS_ARN: ${ssm:/hak/${self:provider.stage}/tara-secrets-arn}
    COGNITO_USER_POOL_ID: ${ssm:/hak/${self:provider.stage}/cognito-user-pool-id}
    COGNITO_CLIENT_ID: ${ssm:/hak/${self:provider.stage}/cognito-client-id}
    FRONTEND_URL_DEV: ${ssm:/hak/dev/frontend-url}
    FRONTEND_URL_PROD: ${ssm:/hak/prod/frontend-url}
    STAGE: ${self:provider.stage}
    ALLOWED_ORIGIN: ${ssm:/hak/${self:provider.stage}/frontend-url}
    COGNITO_DOMAIN: ${ssm:/hak/shared/cognito-domain}
  
  vpc:
    securityGroupIds:
      - ${ssm:/hak/shared/lambda-security-group-id}
    subnetIds:
      - ${ssm:/hak/shared/private-subnet-id-1}
      - ${ssm:/hak/shared/private-subnet-id-2}
  
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - cognito-idp:AdminCreateUser
            - cognito-idp:AdminGetUser
            - cognito-idp:AdminUpdateUserAttributes
            - cognito-idp:AdminInitiateAuth
            - cognito-idp:AdminRespondToAuthChallenge
            - cognito-idp:AdminSetUserPassword
            - cognito-idp:ListUsers
          Resource:
            - !Sub arn:aws:cognito-idp:${self:provider.region}:${AWS::AccountId}:userpool/${ssm:/hak/${self:provider.stage}/cognito-user-pool-id}
        - Effect: Allow
          Action:
            - ssm:GetParameter
          Resource:
            - !Sub arn:aws:ssm:${self:provider.region}:${AWS::AccountId}:parameter/hak/*
        - Effect: Allow
          Action:
            - secretsmanager:GetSecretValue
          Resource:
            - !Sub arn:aws:secretsmanager:${self:provider.region}:${AWS::AccountId}:secret:hak/*

functions:
  taraStart:
    handler: src/handler.startHandler
    events:
      - http:
          path: /tara/start
          method: get
          cors: true

  taraCallback:
    handler: src/handler.callbackHandler
    events:
      - http:
          path: /tara/callback
          method: get
          cors: true

  tokenRefresh:
    handler: src/handler.refreshHandler
    events:
      - http:
          path: /tara/refresh
          method: post
          cors: true
      - http:
          path: /tara/refresh
          method: options
          cors: true

  tokenExchange:
    handler: src/handler.exchangeCodeHandler
    events:
      - http:
          path: /tara/exchange-code
          method: post
          cors: true
      - http:
          path: /tara/exchange-code
          method: options
          cors: true

  cognitoTriggers:
    handler: src/cognito-triggers.handler
    description: Cognito Custom Auth triggers for TARA authentication
    # No VPC needed - only processes Cognito events
    vpc: ~

resources:
  Outputs:
    TaraAuthEndpoint:
      Description: TARA Auth API endpoint
      Value: !Sub https://${ApiGatewayRestApi}.execute-api.${AWS::Region}.amazonaws.com/${self:provider.stage}
    CognitoTriggersLambdaArn:
      Description: Cognito Custom Auth triggers Lambda ARN
      Value: !GetAtt CognitoTriggersLambdaFunction.Arn
      Export:
        Name: ${self:service}-${self:provider.stage}-cognito-triggers-arn
