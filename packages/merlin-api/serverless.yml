service: merlin-api

# TODO: migrate to Serverless v4 (v3 is in maintenance mode since 2024)
frameworkVersion: "3"

provider:
  name: aws
  runtime: nodejs20.x
  region: eu-west-1
  stage: ${opt:stage, 'dev'}
  httpApi:
    cors:
      allowedOrigins:
        - https://hak-dev.${env:DOMAIN_NAME, 'example.com'}
        - https://hak.${env:DOMAIN_NAME, 'example.com'}
      allowedMethods:
        - GET
        - POST
        - OPTIONS
      allowedHeaders:
        - Content-Type
        - Authorization

  environment:
    SQS_QUEUE_URL: https://sqs.${self:provider.region}.amazonaws.com/${env:AWS_ACCOUNT_ID}/hak-merlin-${self:provider.stage}-queue
    S3_BUCKET: hak-merlin-${self:provider.stage}-audio

  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - sqs:SendMessage
            - sqs:GetQueueUrl
          Resource: arn:aws:sqs:${self:provider.region}:${env:AWS_ACCOUNT_ID}:hak-merlin-${self:provider.stage}-queue
        - Effect: Allow
          Action:
            - s3:GetObject
            - s3:HeadObject
          Resource: arn:aws:s3:::hak-merlin-${self:provider.stage}-audio/*
        - Effect: Allow
          Action:
            - ecs:UpdateService
            - ecs:DescribeServices
          Resource: arn:aws:ecs:${self:provider.region}:${env:AWS_ACCOUNT_ID}:service/hak-merlin-${self:provider.stage}/merlin-worker

functions:
  synthesize:
    handler: dist/handler.synthesize
    timeout: 30
    events:
      - httpApi:
          path: /synthesize
          method: POST

  status:
    handler: dist/handler.status
    timeout: 10
    events:
      - httpApi:
          path: /status/{cacheKey}
          method: GET

  health:
    handler: dist/handler.health
    timeout: 5
    events:
      - httpApi:
          path: /health
          method: GET

  warmup:
    handler: dist/handler.warmup
    timeout: 10
    environment:
      ECS_CLUSTER: hak-merlin-${self:provider.stage}
      ECS_SERVICE: merlin-worker
    events:
      - httpApi:
          path: /warmup
          method: POST

plugins:
  - serverless-domain-manager

custom:
  customDomain:
    domainName: merlin-${self:provider.stage}.${env:DOMAIN_NAME, 'example.com'}
    basePath: ""
    stage: ${self:provider.stage}
    certificateArn: ${env:CERTIFICATE_ARN, ''}
    createRoute53Record: true
    endpointType: REGIONAL
    hostedZoneId: ${env:HOSTED_ZONE_ID, ''}
    apiType: http

package:
  individually: true
  patterns:
    - "!node_modules/**"
    - "!src/**"
    - "!test/**"
    - "dist/**"
