service: vabamorf-api

frameworkVersion: "3"

custom:
  concurrency:
    prod:
      api: 25

  allowedOrigin:
    dev: https://hak-dev.${env:DOMAIN_NAME, 'example.com'}
    prod: https://hak.${env:DOMAIN_NAME, 'example.com'}

provider:
  name: aws
  runtime: nodejs22.x
  stage: ${opt:stage, 'dev'}
  region: eu-west-1
  logRetentionInDays: 30
  tracing:
    lambda: true
  httpApi:
    authorizers:
      cognitoAuthorizer:
        type: jwt
        identitySource: $request.header.Authorization
        issuerUrl: https://cognito-idp.${self:provider.region}.amazonaws.com/${ssm:/hak/${self:provider.stage}/cognito-user-pool-id}
        audience:
          - ${ssm:/hak/${self:provider.stage}/cognito-client-id}
    cors:
      allowedOrigins:
        - ${self:custom.allowedOrigin.${self:provider.stage}}
      allowedMethods:
        - GET
        - POST
        - OPTIONS
      allowedHeaders:
        - Content-Type
        - Authorization

  environment:
    VMETAJSON_PATH: /var/task/vmetajson.bin
    DICT_PATH: /var/task
    AWS_LWA_PORT: 8080
    PORT: 8080
    ALLOWED_ORIGIN: ${self:custom.allowedOrigin.${self:provider.stage}}

  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - xray:PutTraceSegments
            - xray:PutTelemetryRecords
          Resource: "*"

  ecr:
    images:
      vabamorf:
        uri: ${env:VABAMORF_IMAGE_URI}

functions:
  api:
    image:
      name: vabamorf
    timeout: 30
    reservedConcurrency: ${self:custom.concurrency.${self:provider.stage}.api, null}
    memorySize: 1024
    events:
      - httpApi:
          path: /analyze
          method: POST
          authorizer:
            name: cognitoAuthorizer
      - httpApi:
          path: /variants
          method: POST
          authorizer:
            name: cognitoAuthorizer
      - httpApi:
          path: /health
          method: GET

resources:
  Outputs:
    ApiEndpoint:
      Description: Vabamorf API Gateway endpoint URL
      Value: !Sub https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com
