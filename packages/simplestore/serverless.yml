service: simplestore

frameworkVersion: '3'

plugins:
  - serverless-offline
  - serverless-domain-manager

custom:
  # Custom domain configuration
  # Domain: hak-api-{stage}.askend-lab.com (dev) / hak-api.askend-lab.com (prod)
  domainName:
    dev: hak-api-dev.askend-lab.com
    prod: hak-api.askend-lab.com
  
  customDomain:
    domainName: ${self:custom.domainName.${self:provider.stage}}
    basePath: api
    stage: ${self:provider.stage}
    certificateName: '*.askend-lab.com'
    createRoute53Record: true
    endpointType: regional
    securityPolicy: tls_1_2
    apiType: rest

provider:
  name: aws
  runtime: nodejs18.x
  stage: ${opt:stage, 'dev'}
  region: ${opt:region, 'eu-west-1'}
  
  environment:
    TABLE_NAME: ${self:service}-${self:provider.stage}
    APP_NAME: ${self:service}
    TENANT: default
    ENVIRONMENT: ${self:provider.stage}
  
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:PutItem
            - dynamodb:GetItem
            - dynamodb:DeleteItem
            - dynamodb:Query
          Resource:
            - !GetAtt DataTable.Arn

functions:
  api:
    handler: dist/src/lambda/handler.handler
    events:
      - http:
          path: /save
          method: post
          cors: true
          authorizer:
            type: COGNITO_USER_POOLS
            authorizerId: !Ref ApiGatewayAuthorizer
      - http:
          path: /get
          method: get
          cors: true
          authorizer:
            type: COGNITO_USER_POOLS
            authorizerId: !Ref ApiGatewayAuthorizer
      - http:
          path: /delete
          method: delete
          cors: true
          authorizer:
            type: COGNITO_USER_POOLS
            authorizerId: !Ref ApiGatewayAuthorizer
      - http:
          path: /query
          method: get
          cors: true
          authorizer:
            type: COGNITO_USER_POOLS
            authorizerId: !Ref ApiGatewayAuthorizer

resources:
  Resources:
    DataTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:service}-${self:provider.stage}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: PK
            AttributeType: S
          - AttributeName: SK
            AttributeType: S
        KeySchema:
          - AttributeName: PK
            KeyType: HASH
          - AttributeName: SK
            KeyType: RANGE
        TimeToLiveSpecification:
          AttributeName: ttl
          Enabled: true

    # Use centralized Cognito User Pool (askend-lab-users)
    # Pool ID: eu-west-1_wlRtuLkG2
    # Client ID: 64tf6nf61n6sgftqif6q975hka
    # Domain: askend-lab-auth.auth.eu-west-1.amazoncognito.com

    ApiGatewayAuthorizer:
      Type: AWS::ApiGateway::Authorizer
      Properties:
        Name: CognitoAuthorizer
        Type: COGNITO_USER_POOLS
        IdentitySource: method.request.header.Authorization
        RestApiId: !Ref ApiGatewayRestApi
        ProviderARNs:
          - arn:aws:cognito-idp:eu-west-1:465168436856:userpool/eu-west-1_wlRtuLkG2

  Outputs:
    ApiEndpoint:
      Description: API Gateway endpoint URL
      Value: !Sub https://${ApiGatewayRestApi}.execute-api.${AWS::Region}.amazonaws.com/${self:provider.stage}
    
    TableName:
      Description: DynamoDB Table Name
      Value: !Ref DataTable
