service: simplestore

frameworkVersion: "3"

plugins:
  - serverless-esbuild
  - serverless-offline

custom:
  esbuild:
    bundle: true
    minify: false
    sourcemap: true
    platform: "node"
    target: "node20"
    packager: "pnpm"


  allowedOrigin:
    dev: https://hak-dev.${env:DOMAIN_NAME, 'example.com'}
    prod: "https://hak.${env:DOMAIN_NAME, 'example.com'},https://haaldusabiline.eki.ee"

provider:
  name: aws
  runtime: nodejs22.x
  memorySize: 512
  timeout: 10
  stage: ${opt:stage, 'dev'}
  region: ${opt:region, 'eu-west-1'}
  logRetentionInDays: 30
  tracing:
    lambda: true
    apiGateway: true
  environment:
    TABLE_NAME: ${self:service}-${self:provider.stage}
    APP_NAME: ${self:service}
    TENANT: default
    ENVIRONMENT: ${self:provider.stage}
    ALLOWED_ORIGIN: ${self:custom.allowedOrigin.${self:provider.stage}}

  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:PutItem
            - dynamodb:GetItem
            - dynamodb:DeleteItem
            - dynamodb:Query
            - dynamodb:UpdateItem
          Resource:
            - !GetAtt DataTable.Arn
        - Effect: Allow
          Action:
            - xray:PutTraceSegments
            - xray:PutTelemetryRecords
          Resource: "*"

functions:
  api:
    handler: src/lambda/handler.handler
    events:
      - http:
          path: /save
          method: post
          cors: true
          authorizer:
            type: COGNITO_USER_POOLS
            authorizerId: !Ref ApiGatewayAuthorizer
      - http:
          path: /get
          method: get
          cors: true
          authorizer:
            type: COGNITO_USER_POOLS
            authorizerId: !Ref ApiGatewayAuthorizer
      - http:
          path: /get-shared
          method: get
          cors: true
      - http:
          path: /get-public
          method: get
          cors: true
      - http:
          path: /delete
          method: delete
          cors: true
          authorizer:
            type: COGNITO_USER_POOLS
            authorizerId: !Ref ApiGatewayAuthorizer
      - http:
          path: /query
          method: get
          cors: true
          authorizer:
            type: COGNITO_USER_POOLS
            authorizerId: !Ref ApiGatewayAuthorizer
      - http:
          path: /health
          method: get
          cors: true

resources:
  Resources:
    DataTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:service}-${self:provider.stage}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: PK
            AttributeType: S
          - AttributeName: SK
            AttributeType: S
        KeySchema:
          - AttributeName: PK
            KeyType: HASH
          - AttributeName: SK
            KeyType: RANGE
        TimeToLiveSpecification:
          AttributeName: ttl
          Enabled: true
        PointInTimeRecoverySpecification:
          PointInTimeRecoveryEnabled: true

    # Cognito User Pool — ARN provided via environment variable
    ApiGatewayAuthorizer:
      Type: AWS::ApiGateway::Authorizer
      Properties:
        Name: CognitoAuthorizer
        Type: COGNITO_USER_POOLS
        IdentitySource: method.request.header.Authorization
        RestApiId: !Ref ApiGatewayRestApi
        ProviderARNs:
          - ${env:COGNITO_USER_POOL_ARN}

  Outputs:
    ApiEndpoint:
      Description: API Gateway endpoint URL
      Value: !Sub https://${ApiGatewayRestApi}.execute-api.${AWS::Region}.amazonaws.com/${self:provider.stage}

    TableName:
      Description: DynamoDB Table Name
      Value: !Ref DataTable
