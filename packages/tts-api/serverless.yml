service: merlin-api

frameworkVersion: "3"

plugins:
  - serverless-esbuild

custom:
  esbuild:
    bundle: true
    minify: false
    sourcemap: true
    platform: "node"
    target: "node20"
    packager: "pnpm"
    external:
      - "@aws-sdk/*"

  concurrency:
    prod:
      synthesize: 25
      status: 25
      health: 5

  allowedOrigin:
    dev: https://hak-dev.${env:DOMAIN_NAME, 'example.com'}
    prod: https://hak.${env:DOMAIN_NAME, 'example.com'}

provider:
  name: aws
  runtime: nodejs22.x
  region: eu-west-1
  stage: ${opt:stage, 'dev'}
  logRetentionInDays: 30
  tracing:
    lambda: true
  httpApi:
    cors:
      allowedOrigins:
        - https://hak-dev.${env:DOMAIN_NAME, 'example.com'}
        - https://hak.${env:DOMAIN_NAME, 'example.com'}
      allowedMethods:
        - GET
        - POST
        - OPTIONS
      allowedHeaders:
        - Content-Type

  environment:
    SQS_QUEUE_URL: https://sqs.${self:provider.region}.amazonaws.com/${env:AWS_ACCOUNT_ID, '000000000000'}/hak-merlin-${self:provider.stage}-queue
    S3_BUCKET: hak-merlin-${self:provider.stage}-audio
    ALLOWED_ORIGIN: ${self:custom.allowedOrigin.${self:provider.stage}}

  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - sqs:SendMessage
            - sqs:GetQueueUrl
            - sqs:GetQueueAttributes
          Resource: arn:aws:sqs:${self:provider.region}:${env:AWS_ACCOUNT_ID, '000000000000'}:hak-merlin-${self:provider.stage}-queue
        - Effect: Allow
          Action:
            - s3:GetObject
            - s3:HeadObject
          Resource: arn:aws:s3:::hak-merlin-${self:provider.stage}-audio/*
        - Effect: Allow
          Action:
            - s3:ListBucket
          Resource: arn:aws:s3:::hak-merlin-${self:provider.stage}-audio
        - Effect: Allow
          Action:
            - ecs:UpdateService
            - ecs:DescribeServices
          Resource: arn:aws:ecs:${self:provider.region}:${env:AWS_ACCOUNT_ID, '000000000000'}:service/hak-merlin-${self:provider.stage}/merlin-worker
        - Effect: Allow
          Action:
            - xray:PutTraceSegments
            - xray:PutTelemetryRecords
          Resource: "*"

functions:
  synthesize:
    handler: src/handler.synthesize
    timeout: 30
    reservedConcurrency: ${self:custom.concurrency.${self:provider.stage}.synthesize, null}
    events:
      - httpApi:
          path: /synthesize
          method: POST

  status:
    handler: src/handler.status
    timeout: 10
    reservedConcurrency: ${self:custom.concurrency.${self:provider.stage}.status, null}
    events:
      - httpApi:
          path: /status/{cacheKey}
          method: GET

  health:
    handler: src/handler.health
    timeout: 5
    reservedConcurrency: ${self:custom.concurrency.${self:provider.stage}.health, null}
    events:
      - httpApi:
          path: /health
          method: GET


resources:
  Resources:
    HttpApiRoutePostSynthesize:
      Type: AWS::ApiGatewayV2::Route
      Properties:
        AuthorizationType: NONE
  Outputs:
    ApiEndpoint:
      Description: Merlin API Gateway endpoint URL
      Value: !Sub https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com
    HttpApiId:
      Description: HTTP API ID (used by Terraform for CloudFront origin)
      Value: !Ref HttpApi
