service: vabamorf-api

frameworkVersion: '3'

provider:
  name: aws
  runtime: nodejs18.x
  stage: ${opt:stage, 'dev'}
  region: ${opt:region, 'us-east-1'}
  
  environment:
    VMETAJSON_PATH: /var/task/vmetajson.bin
    DICT_PATH: /var/task
    AWS_LWA_PORT: 8080
    PORT: 8080

  ecr:
    images:
      vabamorf:
        path: ./

functions:
  # Single function with Lambda Web Adapter - routes all requests to HTTP server
  api:
    image:
      name: vabamorf
    events:
      - http:
          path: /{proxy+}
          method: any
          cors: true
      - http:
          path: /
          method: any
          cors: true

resources:
  Outputs:
    ApiEndpoint:
      Description: Vabamorf API Gateway endpoint URL
      Value: !Sub https://${ApiGatewayRestApi}.execute-api.${AWS::Region}.amazonaws.com/${self:provider.stage}
