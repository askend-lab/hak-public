service: vabamorf-api

# TODO: migrate to Serverless v4 (v3 is in maintenance mode since 2024)
frameworkVersion: "3"

provider:
  name: aws
  runtime: nodejs20.x
  stage: ${opt:stage, 'dev'}
  region: eu-west-1

  environment:
    VMETAJSON_PATH: /var/task/vmetajson.bin
    DICT_PATH: /var/task
    AWS_LWA_PORT: 8080
    PORT: 8080

  ecr:
    images:
      vabamorf:
        uri: ${env:VABAMORF_IMAGE_URI}

functions:
  api:
    image:
      name: vabamorf
    timeout: 30
    memorySize: 1024
    events:
      - httpApi:
          path: /{proxy+}
          method: ANY
      - httpApi:
          path: /
          method: ANY

plugins:
  - serverless-domain-manager

custom:
  customDomain:
    domainName: ${self:custom.domainNames.${self:provider.stage}}
    certificateArn: ${env:CERTIFICATE_ARN, ''}
    endpointType: REGIONAL
    apiType: http
    createRoute53Record: true
    hostedZoneId: ${env:HOSTED_ZONE_ID, ''}
  domainNames:
    dev: vabamorf-dev.${env:DOMAIN_NAME, 'example.com'}
    prod: vabamorf.${env:DOMAIN_NAME, 'example.com'}

resources:
  Outputs:
    ApiEndpoint:
      Description: Vabamorf API Gateway endpoint URL
      Value: !Sub https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com
